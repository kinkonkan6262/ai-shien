    {/* 枚数表示 */}
    <div style={{borderTop:"1px solid #333",padding:"4px 10px",background:"#f9f9f9",fontSize:10,color:"#888",textAlign:"right"}}>
      {y2}年{m2}月 在宅支援記録 ／ {name} ／ {office.name||""}
    </div>
  </div>;
}

function ZaittakuTab({sel,names,allData,setAllData,att,setAtt,office}){
  const [ym,setYm]=useState(monthKey(new Date()));
  const [busy,setBusy]=useState(false);
  const [printAll,setPrintAll]=useState(false);

  const ZAITTAKU_KEY=(name)=>officeKey("zaittaku_"+name+"_"+ym);

  // 在宅記録データの取得・保存
  const getZData=(name)=>{
    try{ return JSON.parse(localStorage.getItem(ZAITTAKU_KEY(name))||"null")||{}; }catch(e){ return {}; }
  };
  const setZData=(name,data)=>{
    try{ localStorage.setItem(ZAITTAKU_KEY(name),JSON.stringify(data)); }catch(e){}
  };

  const [y2,m2]=ym.split("-").map(Number);
  const nd=new Date(y2,m2,0).getDate();
  const WD3=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];

  // 対象利用者
  const targets=printAll?names:(sel?[sel]:[]);

  // 1人分の在宅記録カード
  const ZCard=({name})=>{
    const [zd,setZdState]=useState(()=>getZData(name));
    const upZ=(day,key,val)=>{
      const next={...zd,[day]:{...(zd[day]||{}),[key]:val}};
      setZdState(next);
      setZData(name,next);
      // 支援内容 → 実績記録memoにも反映
      if(setAtt&&(key==="shien"||key==="shien_ai")){
        setAtt(prev=>{
          const pm=prev[ym]||{};
          const pd=pm[day]||{};
          return {...prev,[ym]:{...pm,[day]:{...pd,memo:val}}};
        });
      }
      // 在宅フラグ → 実績記録stにも反映
      if(setAtt&&(key==="st")){
        setAtt(prev=>{
          const pm=prev[ym]||{};
          const pd=pm[day]||{};
          const newSt=val==="\u5728\u5B85"?"\u5728":"";
          return {...prev,[ym]:{...pm,[day]:{...pd,st:newSt||pd.st}}};
        });
      }
    };
    const [aiText,setAiText]=useState({});
    const genAI=async(day)=>{
      const d=zd[day]||{};
      setBusy(true);
      const r=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+name+"\u300D\u5728\u5B85\u652F\u63F4\u8A18\u9332\u3002\u65E5\u4ED8:"+y2+"/"+m2+"/"+day+"\u3002\u9023\u7D61\u4E8B\u9805:\u300C"+(d.renraku||"")+"\u300D\u3001\u652F\u63F4\u5185\u5BB9:\u300C"+(d.shien||"")+"\u300D\u3002\u3010\u672C\u65E5\u306E\u69D8\u5B50\u3011\u3010\u652F\u63F4\u5185\u5BB9\u3011\u3010\u4ECA\u5F8C\u306E\u7559\u610F\u70B9\u3011\u306E\u5F62\u5F0F\u3067\u6574\u7406\u3002\u6587\u7AE0\u306E\u307F\u3002");
      if(r){ setAiText(prev=>({...prev,[day]:r.trim()})); upZ(day,"shien_ai",r.trim()); }
      setBusy(false);
    };

    // 在宅日一覧（att から在宅日を取得）
    const attMonth=(att||{})[ym]||{};
    const zaitakuDays=[];
    for(let d=1;d<=nd;d++){
      const v=attMonth[d]||{};
      if(v.st==="\u5728") zaitakuDays.push(d);
    }

    const u=allData[name]||{};
    const jukyu=u.jukyu||"";

    return <div style={{marginBottom:20}}>
      {/* ヘッダー情報 */}
      <div style={{background:"#E8F5E9",border:"2px solid #388E3C",borderRadius:6,padding:"10px 14px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontWeight:"bold",fontSize:14,color:"#1B5E20"}}>🏠 在宅支援記録 ― {name}</div>
          <div style={{fontSize:11,color:"#555"}}>{fmtYM(ym)} ／ 受給者証番号：{jukyu||"\u672A\u5165\u529B"}</div>
        </div>
        <div style={{fontSize:11,marginTop:4,color:"#388E3C"}}>
          事業所：{office.name||""} ／ サービス管理責任者：{office.kanri||""}
        </div>
      </div>

      {/* 在宅記録テーブル */}
      <div style={{overflowX:"auto",marginBottom:8}}>
      <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
        <thead>
          <tr style={{background:"#1B5E20"}}>
            <th style={{...th,color:"#fff",width:"6%"}}>日</th>
            <th style={{...th,color:"#fff",width:"5%"}}>曜</th>
            <th style={{...th,color:"#fff",width:"10%"}}>開始時刻</th>
            <th style={{...th,color:"#fff",width:"10%"}}>終了時刻</th>
            <th style={{...th,color:"#fff",width:"20%"}}>連絡事項・本人の様子</th>
            <th style={{...th,color:"#fff",width:"28%"}}>支援内容</th>
            <th style={{...th,color:"#fff",width:"10%"}}>担当職員</th>
            <th style={{...th,color:"#fff",width:"11%",fontSize:10}}>提出状況</th>
          </tr>
        </thead>
        <tbody>
          {Array.from({length:nd},(_,i)=>i+1).map(d=>{
            const wd=new Date(y2,m2-1,d).getDay();
            const dd=zd[d]||{};
            const isZaittaku=dd.st==="\u5728\u5B85"||(attMonth[d]||{}).st==="\u5728";
            const bg=isZaittaku?"#F1F8E9":(wd===0?"#FFF5F5":wd===6?"#F0F7FF":"#fff");
            const inp2={width:"100%",padding:"2px 4px",fontSize:10,border:"1px solid #ddd",borderRadius:3};
            return <tr key={d} style={{background:bg}}>
              <td style={{...td,textAlign:"center",fontWeight:"bold"}}>{d}</td>
              <td style={{...td,textAlign:"center",color:wd===0?"#C62828":wd===6?"#1565C0":"#444",fontSize:11}}>{WD3[wd]}</td>
              <td style={{...td,padding:"2px"}}>
                {isZaittaku
                  ?<input value={dd.in||""} onChange={e=>upZ(d,"in",e.target.value)}
                    placeholder="\u4F8B: 10:00" style={inp2}/>
                  :<span style={{color:"#ccc",fontSize:10}}>－</span>}
              </td>
              <td style={{...td,padding:"2px"}}>
                {isZaittaku
                  ?<input value={dd.out||""} onChange={e=>upZ(d,"out",e.target.value)}
                    placeholder="\u4F8B: 11:00" style={inp2}/>
                  :<span style={{color:"#ccc",fontSize:10}}>－</span>}
              </td>
              <td style={{...td,padding:"2px"}}>
                {isZaittaku
                  ?<input value={dd.renraku||""} onChange={e=>upZ(d,"renraku",e.target.value)}
                    placeholder="\u9023\u7D61\u5185\u5BB9\u3092\u5165\u529B" style={inp2}/>
                  :<span style={{color:"#ccc",fontSize:10}}>－</span>}
              </td>
              <td style={{...td,padding:"2px"}}>
                {isZaittaku
                  ?<div style={{display:"flex",gap:3,alignItems:"center"}}>
                    <textarea value={aiText[d]||dd.shien||(attMonth[d]||{}).memo||""} onChange={e=>{upZ(d,"shien",e.target.value);setAiText(prev=>({...prev,[d]:e.target.value}));}}
                      rows={2} placeholder="\u652F\u63F4\u5185\u5BB9\u3092\u5165\u529B"
                      style={{...inp2,resize:"vertical",fontSize:10}}/>
                    <button className="np" onClick={()=>genAI(d)} disabled={busy}
                      style={{fontSize:9,padding:"2px 4px",background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:3,cursor:"pointer",whiteSpace:"nowrap"}}>
                      🤖AI
                    </button>
                  </div>
                  :<span style={{color:"#ccc",fontSize:10}}>－</span>}
              </td>
              <td style={{...td,padding:"2px"}}>
                {isZaittaku
                  ?<input value={dd.staff||""} onChange={e=>upZ(d,"staff",e.target.value)}
                    placeholder="\u62C5\u5F53\u8005\u540D" style={inp2}/>
                  :<span style={{color:"#ccc",fontSize:10}}>－</span>}
              </td>
              <td style={{...td,padding:"2px",textAlign:"center"}}>
                {isZaittaku
                  ?<select value={dd.teishutsu||""} onChange={e=>upZ(d,"teishutsu",e.target.value)}
                    style={{width:"100%",fontSize:10,border:"1px solid #ddd",borderRadius:3,padding:"2px"}}>
                    <option value="">未提出</option>
                    <option value="\u63D0\u51FA\u6E08">提出済</option>
                    <option value="\u78BA\u8A8D\u6E08">確認済</option>
                    <option value="\u5728\u5B85">在宅</option>
                  </select>
                  :<span style={{color:"#ccc",fontSize:10}}>－</span>}
              </td>
            </tr>;
          })}
        </tbody>
      </table>
      </div>
      {zaitakuDays.length===0&&<div style={{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:5,padding:"8px 12px",fontSize:11,color:"#666"}}>
        💡 実績記録タブで「在」（在宅）を設定すると、この画面に在宅日が表示されます。
      </div>}
      {/* 集計 */}
      {zaitakuDays.length>0&&<div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"8px 12px",fontSize:11,color:"#1B5E20",fontWeight:"bold",marginBottom:12}}>
        📊 在宅支援日数：{zaitakuDays.length}日 ／ 提出済：{Object.values(zd).filter(v=>v.teishutsu==="\u63D0\u51FA\u6E08"||v.teishutsu==="\u78BA\u8A8D\u6E08").length}件
      </div>}

      {/* ===== 在宅支援の評価（写真様式準拠） ===== */}
      <ZHyokaSection zd={zd} upZ={upZ} name={name} ym={ym} office={office} genAI={genAI} busy={busy} zaitakuDays={zaitakuDays} attMonth={attMonth}/>
    </div>;
  };

  return <div style={{padding:14}}>
    <Header title={"\u1F3E0 \u5728\u5B85\u652F\u63F4\u8A18\u9332 \u2015 "+fmtYM(ym)}>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
      <MonthNav ym={ym} setYm={setYm}/>
      <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
        <input type="checkbox" checked={printAll} onChange={e=>setPrintAll(e.target.checked)} style={{accentColor:"#388E3C"}}/>
        全員まとめて表示・印刷
      </label>
    </div>
    <div style={{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:5,padding:"6px 12px",marginBottom:10,fontSize:11,color:"#555"}}>
      💡 実績記録タブで出欠区分を「在」（在宅）に設定すると、この画面の該当日に在宅記録欄が表示されます。支援内容はAIで自動生成できます。
    </div>
    {targets.length===0&&<div style={{textAlign:"center",padding:30,color:"#999"}}>利用者を選択するか「全員まとめて表示・印刷」にチェックしてください</div>}
    {targets.map(name=><ZCard key={name} name={name}/>)}
  </div>;
}

function OutsideTab({names,allData,office}){
  const [ym,setYm]=useState(monthKey(new Date()));
  const [busy,setBusy]=useState(false);
  const [aiPlan,setAiPlan]=useState("");
  const [viewDay,setViewDay]=useState(null); // 日付クリックで当日詳細

  const WD2=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];

  const [y2,m2]=ym.split("-").map(Number);
  const nd=new Date(y2,m2,0).getDate();

  // 月全体の施設外就労一覧
  const rows=names.map(n=>{
    const u=allData[n]||{};
    const md=(u.att||{})[ym]||{};
    const outDays=[];
    for(let d=1;d<=nd;d++){
      const v=md[d]||{};
      if(v.st==="\u5916"){
        const dt=new Date(y2,m2-1,d);
        outDays.push({d,wd:WD2[dt.getDay()],in:v.in||"",out:v.out||"",memo:v.memo||""});
      }
    }
    const {use}=getAttDays(u.att||{},ym);
    return {n,jukyu:u.jukyu||"",outDays,outCount:outDays.length,inCount:use};
  }).filter(r=>r.outCount>0||r.inCount>0);

  // 当日集計（施設外+通所）
  const buildDayReport=(day)=>{
    const outsideList=[];
    const insideList=[];
    names.forEach(n=>{
      const u=allData[n]||{};
      const md=(u.att||{})[ym]||{};
      const v=md[day]||{};
      if(v.st==="\u5916") outsideList.push({n,in:v.in||"",out:v.out||"",memo:v.memo||""});
      else if(v.st==="\u901A") insideList.push({n,in:v.in||"",out:v.out||"",memo:v.memo||""});
    });
    return {day,wd:WD2[new Date(y2,m2-1,day).getDay()],outsideList,insideList};
  };

  const totalOut=rows.reduce((a,r)=>a+r.outCount,0);

  const dlCsv=()=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    let lines=[["\u6C0F\u540D","\u53D7\u7D66\u8005\u8A3C\u756A\u53F7","\u65E5","\u66DC\u65E5","\u533A\u5206","\u958B\u59CB","\u7D42\u4E86","\u5099\u8003"].map(esc).join(",")];
    names.forEach(n=>{
      const u=allData[n]||{};
      const md=(u.att||{})[ym]||{};
      for(let d=1;d<=nd;d++){
        const v=md[d]||{};
        if(v.st==="\u5916"||v.st==="\u901A"){
          const dt=new Date(y2,m2-1,d);
          lines.push([n,u.jukyu||"",d,WD2[dt.getDay()],v.st==="\u5916"?"\u65BD\u8A2D\u5916\u5C31\u52B4":"\u901A\u6240",v.in||"",v.out||"",v.memo||""].map(esc).join(","));
        }
      }
    });
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u65BD\u8A2D\u5916\u5C31\u52B4_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };

  const genAI=async()=>{
    setBusy(true);setAiPlan("");
    const summary=rows.filter(r=>r.outCount>0).map(r=>`${r.n}:施設外${r.outCount}日`).join("\u3001");
    const txt=await ai(`就労継続支援B型「${office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}」${fmtYM(ym)}施設外就労。${summary||"\u65BD\u8A2D\u5916\u5C31\u52B4\u306A\u3057"}、延べ${totalOut}日。今月の振り返りと来月への一言を70文字以内で。`);
    setAiPlan(txt||"");setBusy(false);
  };

  const dayReport=viewDay?buildDayReport(viewDay):null;

  return <div style={{padding:14}}>
    <Header title={"\u1F3ED \u65BD\u8A2D\u5916\u5C31\u52B4 \u2015 "+fmtYM(ym)}>
      <GBtn onClick={dlCsv} color="#1B5E20">📥 CSV出力（施設外+通所）</GBtn>
      <GBtn onClick={genAI} busy={busy}>🤖 AIコメント</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:12,alignItems:"center",marginBottom:10}}>
      <MonthNav ym={ym} setYm={setYm}/>
      <div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"5px 12px",fontSize:11,color:"#1B5E20"}}>
        施設外就労者：<b>{rows.filter(r=>r.outCount>0).length}名</b> ／ 延べ：<b>{totalOut}日</b>
      </div>
    </div>
    {aiPlan&&<div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"7px 12px",marginBottom:8,fontSize:12,color:"#1B5E20"}}>💬 {aiPlan}</div>}

    {/* ▼ 当日集計ボタン（日付カレンダー） */}
    <div style={{background:"#E3F2FD",border:"1px solid #90CAF9",borderRadius:6,padding:10,marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:"bold",color:"#1565C0",marginBottom:6}}>📅 当日集計（日付をクリック → 施設外＋通所 同時表示）</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
        {Array.from({length:nd},(_,i)=>i+1).map(d=>{
          const dt=new Date(y2,m2-1,d);
          const wd=dt.getDay();
          // この日の施設外人数
          const cnt=names.filter(n=>{const v=((allData[n]||{}).att||{})[ym]?.[d]||{};return v.st==="\u5916";}).length;
          const cntIn=names.filter(n=>{const v=((allData[n]||{}).att||{})[ym]?.[d]||{};return v.st==="\u901A";}).length;
          const isWe=wd===0||wd===6;
          return <button key={d} onClick={()=>setViewDay(viewDay===d?null:d)}
            style={{width:36,height:36,border:viewDay===d?"2px solid #1565C0":"1px solid #90CAF9",borderRadius:4,cursor:isWe?"default":"pointer",
              background:viewDay===d?"#1565C0":cnt>0?"#E8F5E9":isWe?"#f5f5f5":"#fff",
              color:viewDay===d?"#fff":wd===0?"#C62828":wd===6?"#1565C0":"#333",
              fontSize:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",lineHeight:1.2}}>
            <span>{d}</span>
            {(cnt>0||cntIn>0)&&<span style={{fontSize:8,color:viewDay===d?"#fff":"#388E3C"}}>外{cnt}/通{cntIn}</span>}
          </button>;
        })}
      </div>
    </div>

    {/* 当日詳細 */}
    {dayReport&&<div style={{background:"#fff",border:"2px solid #1565C0",borderRadius:6,padding:12,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:"bold",color:"#1565C0",marginBottom:8}}>
        📋 {m2}月{dayReport.day}日（{dayReport.wd}）の出勤状況
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div>
          <div style={{fontSize:11,fontWeight:"bold",color:"#1B5E20",marginBottom:4}}>🏭 施設外就労 ({dayReport.outsideList.length}名)</div>
          {dayReport.outsideList.length===0?<div style={{fontSize:11,color:"#999"}}>なし</div>:
            dayReport.outsideList.map((u,i)=><div key={i} style={{fontSize:11,padding:"3px 0",borderBottom:"1px solid #eee"}}>
              {u.n}　{u.in&&u.out?u.in+"\u301C"+u.out:""}　{u.memo&&<span style={{color:"#555"}}>({u.memo})</span>}
            </div>)}
        </div>
        <div>
          <div style={{fontSize:11,fontWeight:"bold",color:"#0277BD",marginBottom:4}}>🏠 通所 ({dayReport.insideList.length}名)</div>
          {dayReport.insideList.length===0?<div style={{fontSize:11,color:"#999"}}>なし</div>:
            dayReport.insideList.map((u,i)=><div key={i} style={{fontSize:11,padding:"3px 0",borderBottom:"1px solid #eee"}}>
              {u.n}　{u.in&&u.out?u.in+"\u301C"+u.out:""}
            </div>)}
        </div>
      </div>
    </div>}

    {/* 月別一覧 */}
    {rows.filter(r=>r.outCount>0).map(r=><div key={r.n} style={{marginBottom:14,border:"1px solid #A5D6A7",borderRadius:6,overflow:"hidden"}}>
      <div style={{background:"#1B5E20",color:"#fff",padding:"6px 12px",fontSize:12,fontWeight:"bold",display:"flex",justifyContent:"space-between"}}>
        <span>🏭 {r.n}</span>
        <span>施設外 {r.outCount}日 ／ 総利用 {r.inCount}日</span>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse"}}>
        <thead><tr>
          <th style={{...th,width:"8%"}}>日</th>
          <th style={{...th,width:"8%"}}>曜</th>
          <th style={{...th,width:"12%"}}>開始</th>
          <th style={{...th,width:"12%"}}>終了</th>
          <th style={th}>就労内容・備考</th>
        </tr></thead>
        <tbody>
          {r.outDays.map(d=><tr key={d.d}>
            <td style={{...td,textAlign:"center"}}>{d.d}</td>
            <td style={{...td,textAlign:"center",color:d.wd==="\u65E5"?"#C62828":d.wd==="\u571F"?"#1565C0":"#444"}}>{d.wd}</td>
            <td style={{...td,textAlign:"center"}}>{d.in}</td>
            <td style={{...td,textAlign:"center"}}>{d.out}</td>
            <td style={td}>{d.memo||<span style={{color:"#bbb"}}>（記録なし）</span>}</td>
          </tr>)}
        </tbody>
      </table>
    </div>)}
    {rows.filter(r=>r.outCount>0).length===0&&<div style={{textAlign:"center",color:"#999",padding:20}}>この月の施設外就労記録がありません</div>}
  </div>;
}



// ============================================================
// 15. 皆勤賞タブ（開所日数選択・設定localStorage保存・入力値保持）
// ============================================================
function KaikinTab({names,allData,office}){
  const [ym,setYm]=useState(monthKey(new Date()));
  const [busy,setBusy]=useState(false);
  const [aiMsg,setAiMsg]=useState({});

  // localStorage から設定を復元（タブ切替後も保持）
  const KAIKIN_KEY=officeKey("kaikin_settings");
  const loadKaikinSettings=()=>{
    try{ return JSON.parse(localStorage.getItem(KAIKIN_KEY)||"{}"); }catch(e){ return {}; }
  };
  const [settings,setSettingsState]=useState(()=>loadKaikinSettings());
  // 設定を更新してlocalStorageに保存
  const saveSettings=(key,val)=>{
    setSettingsState(prev=>{
      const next={...prev,[key]:val};
      try{localStorage.setItem(KAIKIN_KEY,JSON.stringify(next));}catch(e){}
      return next;
    });
  };

  // 月別の開所日設定（キー: "YYYY-MM_open", "YYYY-MM_sat"）
  const openKey=ym+"_open";
  const satKey=ym+"_sat";
  const modeKey=ym+"_mode"; // "all"=平日全て, "count"=日数選択, "manual"=手動入力
  const openDaysInput=settings[openKey]||"";
  const satDaysInput=settings[satKey]||"";
  const inputMode=settings[modeKey]||"all"; // デフォルト: 平日全て

  const setOpenDaysInput=v=>saveSettings(openKey,v);
  const setSatDaysInput=v=>saveSettings(satKey,v);
  const setInputMode=v=>saveSettings(modeKey,v);

  const [y2,m2]=ym.split("-").map(Number);
  const nd=new Date(y2,m2,0).getDate();
  const WD2=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];

  // 月の平日一覧
  const allWeekdays=[];
  for(let d=1;d<=nd;d++){
    const wd=new Date(y2,m2-1,d).getDay();
    if(wd!==0&&wd!==6) allWeekdays.push(d);
  }
  // 月の土曜一覧
  const allSaturdays=[];
  for(let d=1;d<=nd;d++){
    if(new Date(y2,m2-1,d).getDay()===6) allSaturdays.push(d);
  }

  // 開所日数（count指定 or 手動）の日数選択
  const countKey=ym+"_count";
  const openCount2=settings[countKey]||allWeekdays.length;
  const setOpenCount2=v=>saveSettings(countKey,Number(v));

  // 開所日リストを解析
  const parseOpenDays=()=>{
    if(inputMode==="all"){
      return allWeekdays;
    } else if(inputMode==="count"){
      // 平日の先頭N日を開所日とする
      return allWeekdays.slice(0,Number(openCount2)||allWeekdays.length);
    } else {
      if(!openDaysInput.trim()) return allWeekdays;
      return openDaysInput.split(/[,、\s]+/).map(Number).filter(d=>d>=1&&d<=nd);
    }
  };

  // 土曜日リストを解析
  const parseSatDays=()=>{
    if(!satDaysInput.trim()) return [];
    if(satDaysInput.trim()==="all") return allSaturdays;
    return satDaysInput.split(/[,、\s]+/).map(Number).filter(d=>d>=1&&d<=nd);
  };

  const openDays=parseOpenDays();
  const satDays=parseSatDays();
  const openCount=openDays.length;
  const satCount=satDays.length;

  const rows=names.map(n=>{
    const u=allData[n]||{};
    const md=(u.att||{})[ym]||{};
    let use=0,abs=0,kasan=0,satUse=0;
    openDays.forEach(d=>{
      const v=md[d]||{};
      if(v.st==="\u901A"||v.st==="\u5916") use++;
      else if(v.st==="\u6B20") abs++;
      else if(v.st==="\u52A0") kasan++;
    });
    // 土曜皆勤チェック
    satDays.forEach(d=>{
      const v=md[d]||{};
      if(v.st==="\u901A"||v.st==="\u5916") satUse++;
    });
    const rate=openCount>0?Math.round(use/openCount*100):0;
    const isPerfect=abs===0&&kasan===0&&use>=openCount;
    const isHigh=rate>=90;
    const isSatPerfect=satCount>0&&satUse>=satCount;
    return {n,use,abs,kasan,satUse,rate,isPerfect,isHigh,isSatPerfect,jukyu:u.jukyu||""};
  }).filter(r=>r.use>0||r.abs>0||r.kasan>0||r.satUse>0);

  const perfect=rows.filter(r=>r.isPerfect);
  const satPerfect=rows.filter(r=>r.isSatPerfect&&satCount>0);
  const high=rows.filter(r=>r.isHigh&&!r.isPerfect);

  const genMsg=async(name)=>{
    setBusy(true);
    const r=rows.find(x=>x.n===name)||{};
    const extra=r.isSatPerfect&&satCount>0?"\u571F\u66DC\u7686\u52E4\u8CDE\u3082\u9054\u6210\uFF01":"";
    const txt=await ai(`就労継続支援B型「${office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}」${fmtYM(ym)}皆勤賞メッセージを50文字以内で。利用者:${name}、出席:${r.use}日、出席率:${r.rate}%。${extra}温かく激励する言葉で。`);
    setAiMsg(prev=>({...prev,[name]:txt||""}));setBusy(false);
  };

  const dlCsv=()=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const lines=[["\u6C0F\u540D","\u53D7\u7D66\u8005\u8A3C\u756A\u53F7","\u5229\u7528\u65E5\u6570","\u6B20\u5E2D","\u6B20\u5E2D\u52A0\u7B97","\u51FA\u5E2D\u7387(%)","\u7686\u52E4","\u571F\u66DC\u7686\u52E4"].map(esc).join(",")]
      .concat(rows.sort((a,b)=>b.rate-a.rate).map(r=>[r.n,r.jukyu,r.use,r.abs,r.kasan,r.rate,
        r.isPerfect?"\u1F3C6\u7686\u52E4":"",r.isSatPerfect&&satCount>0?"\u2B50\u571F\u66DC\u7686\u52E4":""].map(esc).join(",")));
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u7686\u52E4\u8CDE_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };

  return <div style={{padding:14}}>
    <Header title={"\u1F3C6 \u7686\u52E4\u8CDE\u30FB\u51FA\u5E2D\u72B6\u6CC1 \u2015 "+fmtYM(ym)}>
      <GBtn onClick={dlCsv} disabled={rows.length===0} color="#1B5E20">📥 CSV出力</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
      <MonthNav ym={ym} setYm={setYm}/>
    </div>
    {/* 開所日設定（localStorage保存で他タブ移動後も保持） */}
    <div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:6,padding:10,marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:"bold",color:"#1B5E20",marginBottom:8}}>📅 開所日・土曜日の設定（自動保存）</div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
        {/* 開所日設定 */}
        <div style={{flex:1,minWidth:280}}>
          <div style={{fontSize:11,fontWeight:"bold",color:"#1B5E20",marginBottom:4}}>🏢 開所日の設定方法</div>
          <div style={{display:"flex",gap:8,marginBottom:6}}>
            {[["all","\u5E73\u65E5\u5168\u3066\uFF08\u30C7\u30D5\u30A9\u30EB\u30C8\uFF09"],["count","\u958B\u6240\u65E5\u6570\u3092\u9078\u629E"],["manual","\u65E5\u4ED8\u3092\u624B\u52D5\u5165\u529B"]].map(([v,lbl])=>(
              <label key={v} style={{fontSize:11,display:"flex",alignItems:"center",gap:3,cursor:"pointer",
                background:inputMode===v?"#1B5E20":"#fff",color:inputMode===v?"#fff":"#333",
                border:"1px solid "+(inputMode===v?"#1B5E20":"#A5D6A7"),borderRadius:4,padding:"3px 8px"}}>
                <input type="radio" value={v} checked={inputMode===v} onChange={()=>setInputMode(v)}
                  style={{display:"none"}}/>
                {lbl}
              </label>
            ))}
          </div>
          {inputMode==="all"&&<div style={{fontSize:11,color:"#555",padding:"4px 8px",background:"#fff",borderRadius:4,border:"1px solid #C8E6C9"}}>
            📌 {fmtYM(ym)}の平日: <b style={{color:"#1B5E20"}}>{allWeekdays.length}日</b>（{allWeekdays[0]}日〜{allWeekdays[allWeekdays.length-1]}日）
          </div>}
          {inputMode==="count"&&<div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:11,color:"#555"}}>開所日数：</span>
            <select value={openCount2} onChange={e=>setOpenCount2(e.target.value)}
              style={{padding:"4px 8px",fontSize:12,border:"1px solid #A5D6A7",borderRadius:4,fontWeight:"bold"}}>
              {Array.from({length:allWeekdays.length},(_,i)=>i+1).map(n=>(
                <option key={n} value={n}>{n}日</option>
              ))}
            </select>
            <span style={{fontSize:11,color:"#555"}}>（平日の先頭から）</span>
          </div>}
          {inputMode==="manual"&&<div>
            <div style={{fontSize:10,color:"#888",marginBottom:2}}>日付をスペース・カンマ区切りで入力</div>
            <input value={openDaysInput} onChange={e=>setOpenDaysInput(e.target.value)}
              placeholder="\u4F8B: 1 2 3 6 7 8 9 10"
              style={{width:"100%",padding:"5px 8px",fontSize:11,border:"1px solid #A5D6A7",borderRadius:4}}/>
          </div>}
          <div style={{marginTop:5,fontSize:11,color:"#1B5E20",fontWeight:"bold"}}>
            → 開所日数: <span style={{fontSize:14}}>{openCount}</span>日
            <span style={{fontSize:10,color:"#888",marginLeft:8,fontWeight:"normal"}}>（設定は自動保存されます）</span>
          </div>
        </div>
        {/* 土曜設定 */}
        <div style={{minWidth:200}}>
          <div style={{fontSize:11,fontWeight:"bold",color:"#1565C0",marginBottom:4}}>⭐ 土曜皆勤賞の設定</div>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <label style={{fontSize:11,display:"flex",alignItems:"center",gap:3,cursor:"pointer",
              background:satDaysInput==="all"?"#1565C0":"#fff",color:satDaysInput==="all"?"#fff":"#333",
              border:"1px solid "+(satDaysInput==="all"?"#1565C0":"#90CAF9"),borderRadius:4,padding:"3px 8px"}}>
              <input type="radio" checked={satDaysInput==="all"} onChange={()=>setSatDaysInput("all")} style={{display:"none"}}/>
              全土曜({allSaturdays.length}日)
            </label>
            <label style={{fontSize:11,display:"flex",alignItems:"center",gap:3,cursor:"pointer",
              background:satDaysInput!==""&&satDaysInput!=="all"?"#1565C0":"#fff",
              color:satDaysInput!==""&&satDaysInput!=="all"?"#fff":"#333",
              border:"1px solid "+(satDaysInput!==""&&satDaysInput!=="all"?"#1565C0":"#90CAF9"),borderRadius:4,padding:"3px 8px"}}>
              <input type="radio" checked={satDaysInput!==""&&satDaysInput!=="all"} onChange={()=>setSatDaysInput("")} style={{display:"none"}}/>
              手動入力
            </label>
            <label style={{fontSize:11,display:"flex",alignItems:"center",gap:3,cursor:"pointer",
              background:satDaysInput===""?"#fff":"#fff",color:satDaysInput===""?"#888":"#333",
              border:"1px solid #90CAF9",borderRadius:4,padding:"3px 8px"}}>
              <input type="radio" checked={satDaysInput===""} onChange={()=>setSatDaysInput("")} style={{display:"none"}}/>
              設定なし
            </label>
          </div>
          {satDaysInput!=="all"&&<input value={satDaysInput} onChange={e=>setSatDaysInput(e.target.value)}
            placeholder="\u4F8B: 7 14 21 28"
            style={{width:"100%",padding:"5px 8px",fontSize:11,border:"1px solid #90CAF9",borderRadius:4}}/>}
          <div style={{marginTop:4,fontSize:11,color:"#1565C0",fontWeight:"bold"}}>
            → 土曜 {satCount}日指定
          </div>
        </div>
      </div>
    </div>

    {/* 皆勤賞 */}
    {perfect.length>0&&<div style={{background:"linear-gradient(135deg,#FFF8E1,#FFFDE7)",border:"2px solid #F9A825",borderRadius:8,padding:12,marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:"bold",color:"#E65100",marginBottom:8}}>🏆 皆勤賞 おめでとうございます！ ({perfect.length}名)</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {perfect.map(r=><div key={r.n} style={{background:"#fff",border:"2px solid #F9A825",borderRadius:6,padding:"8px 14px",minWidth:160}}>
          <div style={{fontWeight:"bold",fontSize:13,color:"#E65100"}}>⭐ {r.n}</div>
          <div style={{fontSize:11,color:"#555",marginTop:2}}>皆勤 {r.use}日 / 出席率100%</div>
          {r.isSatPerfect&&satCount>0&&<div style={{fontSize:10,color:"#1565C0",marginTop:2}}>⭐ 土曜皆勤賞も達成！</div>}
          {aiMsg[r.n]&&<div style={{fontSize:10,color:"#388E3C",marginTop:4,fontStyle:"italic"}}>💬 {aiMsg[r.n]}</div>}
          <button onClick={()=>genMsg(r.n)} disabled={busy}
            style={{marginTop:4,padding:"2px 8px",fontSize:10,background:"#1B5E20",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>
            🤖 メッセージ生成
          </button>
        </div>)}
      </div>
    </div>}

    {/* 土曜皆勤賞 */}
    {satCount>0&&satPerfect.length>0&&<div style={{background:"#E3F2FD",border:"2px solid #1565C0",borderRadius:8,padding:12,marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:"bold",color:"#1565C0",marginBottom:8}}>⭐ 土曜皆勤賞！ ({satPerfect.length}名)</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {satPerfect.map(r=><div key={r.n} style={{background:"#fff",border:"1px solid #90CAF9",borderRadius:6,padding:"8px 14px",minWidth:160}}>
          <div style={{fontWeight:"bold",fontSize:13,color:"#1565C0"}}>⭐ {r.n}</div>
          <div style={{fontSize:11,color:"#555",marginTop:2}}>土曜 {r.satUse}/{satCount}日 全出席</div>
          {aiMsg[r.n]&&<div style={{fontSize:10,color:"#388E3C",marginTop:4,fontStyle:"italic"}}>💬 {aiMsg[r.n]}</div>}
          <button onClick={()=>genMsg(r.n)} disabled={busy}
            style={{marginTop:4,padding:"2px 8px",fontSize:10,background:"#1565C0",color:"#fff",border:"none",borderRadius:3,cursor:"pointer"}}>
            🤖 メッセージ
          </button>
        </div>)}
      </div>
    </div>}

    {high.length>0&&<div style={{background:"#F3E5F5",border:"1px solid #CE93D8",borderRadius:6,padding:10,marginBottom:12}}>
      <div style={{fontSize:12,fontWeight:"bold",color:"#6A1B9A",marginBottom:6}}>👍 高出席率 (90%以上) {high.length}名</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
        {high.map(r=><div key={r.n} style={{background:"#fff",border:"1px solid #CE93D8",borderRadius:5,padding:"6px 10px"}}>
          <span style={{fontWeight:"bold",fontSize:12}}>{r.n}</span>
          <span style={{fontSize:11,marginLeft:6,color:"#6A1B9A"}}>{r.use}日 / {r.rate}%</span>
          {r.isSatPerfect&&satCount>0&&<span style={{fontSize:10,color:"#1565C0",marginLeft:4}}>⭐土曜</span>}
        </div>)}
      </div>
    </div>}

    <table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr>
        <th style={th}></th>
        <th style={th}>氏名</th>
        <th style={{...th,width:"10%"}}>利用日数</th>
        <th style={{...th,width:"7%"}}>欠席</th>
        <th style={{...th,width:"7%"}}>欠席加算</th>
        <th style={{...th,width:"12%"}}>出席率</th>
        <th style={{...th,width:"9%"}}>皆勤</th>
        {satCount>0&&<th style={{...th,width:"10%"}}>土曜<br/>皆勤賞</th>}
      </tr></thead>
      <tbody>
        {rows.length===0&&<tr><td colSpan={satCount>0?8:7} style={{...td,textAlign:"center",color:"#999",padding:14}}>この月の実績がありません</td></tr>}
        {rows.sort((a,b)=>b.rate-a.rate).map(r=><tr key={r.n}
          style={{background:r.isPerfect?"#FFF8E1":r.isHigh?"#F3E5F5":"#fff"}}>
          <td style={{...td,textAlign:"center",fontSize:16}}>{r.isPerfect?"\u1F3C6":r.isHigh?"\u1F44D":""}</td>
          <td style={{...td,fontWeight:r.isPerfect?"bold":"normal"}}>{r.n}</td>
          <td style={{...td,textAlign:"center",fontWeight:"bold"}}>{r.use}日</td>
          <td style={{...td,textAlign:"center",color:r.abs>0?"#C62828":"#aaa"}}>{r.abs>0?r.abs+"\u65E5":"\uFF0D"}</td>
          <td style={{...td,textAlign:"center",color:r.kasan>0?"#E65100":"#aaa"}}>{r.kasan>0?r.kasan+"\u56DE":"\uFF0D"}</td>
          <td style={{...td,textAlign:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{flex:1,height:8,background:"#eee",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",width:r.rate+"%",
                  background:r.rate>=100?"#F9A825":r.rate>=90?"#388E3C":"#78909C",borderRadius:4}}/>
              </div>
              <span style={{fontSize:11,fontWeight:"bold",minWidth:35,
                color:r.rate>=100?"#E65100":r.rate>=90?"#1B5E20":"#555"}}>{r.rate}%</span>
            </div>
          </td>
          <td style={{...td,textAlign:"center",fontWeight:"bold",color:"#E65100"}}>{r.isPerfect?"\u1F3C6 \u7686\u52E4":""}</td>
          {satCount>0&&<td style={{...td,textAlign:"center",color:"#1565C0",fontWeight:"bold"}}>
            {r.isSatPerfect?"\u2B50 \u9054\u6210":satCount>0?r.satUse+"/"+satCount:""}
          </td>}
        </tr>)}
      </tbody>
    </table>
    <div style={{marginTop:8,fontSize:10,color:"#888"}}>
      ※ 皆勤：指定した開所日にすべて出席した場合。開所日は上の設定欄で毎月手動設定してください。
    </div>
  </div>;
}

// ===== 請求集計（全利用者・月次） =====
function BillTab({names,allData}){
  const [ym,setYm]=useState(monthKey(new Date()));
  const [onlyUsed,setOnlyUsed]=useState(true);
  const rows=names.map(n=>{
    const u=allData[n]||{};
    const c=calcMonth((u.att||{})[ym]||{});
    return {n,j:u.jukyu||"",...c};
  }).filter(r=>!onlyUsed||r.use>0||r.kasan>0);
  const total=rows.reduce((a,r)=>({use:a.use+r.use,out:a.out+r.out,kasan:a.kasan+r.kasan,meal:a.meal+r.meal,s1:a.s1+r.s1,s2:a.s2+r.s2}),{use:0,out:0,kasan:0,meal:0,s1:0,s2:0});
  const dlCsv=()=>{
    const head=["\u6C0F\u540D","\u53D7\u7D66\u8005\u8A3C\u756A\u53F7","\u5229\u7528\u65E5\u6570","\u3046\u3061\u65BD\u8A2D\u5916\u5C31\u52B4","\u6B20\u5E2D\u6642\u5BFE\u5FDC\u52A0\u7B97","\u98DF\u4E8B\u63D0\u4F9B\u4F53\u5236\u52A0\u7B97","\u9001\u8FCE(\u5F80)","\u9001\u8FCE(\u5FA9)"];
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const lines=[head.map(esc).join(",")]
      .concat(rows.map(r=>[r.n,r.j,r.use,r.out,r.kasan,r.meal,r.s1,r.s2].map(esc).join(",")))
      .concat([["\u5408\u8A08","",total.use,total.out,total.kasan,total.meal,total.s1,total.s2].map(esc).join(",")]);
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u8ACB\u6C42\u96C6\u8A08_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };
  const dlDetailCsv=()=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const WD2=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];
    const ATT2={"\u901A":"\u901A\u6240","\u5916":"\u65BD\u8A2D\u5916\u5C31\u52B4","\u6B20":"\u6B20\u5E2D","\u52A0":"\u6B20\u5E2D\u52A0\u7B97","":"\uFF0D"};
    let allLines=[["\u6C0F\u540D","\u53D7\u7D66\u8005\u8A3C\u756A\u53F7","\u65E5\u4ED8","\u66DC\u65E5","\u63D0\u4F9B\u72B6\u6CC1","\u958B\u59CB\u6642\u9593","\u7D42\u4E86\u6642\u9593","\u98DF\u4E8B","\u9001\u8FCE\u5F80","\u9001\u8FCE\u5FA9","\u5099\u8003"].map(esc).join(",")];
    rows.forEach(r=>{
      const u=allData[r.n]||{};
      const md=(u.att||{})[ym]||{};
      const [y2,m2]=ym.split("-").map(Number);
      const nd2=new Date(y2,m2,0).getDate();
      for(let d=1;d<=nd2;d++){
        const v=md[d]||{};
        if(!v.st) continue;
        const dt=new Date(y2,m2-1,d);
        allLines.push([r.n,r.j,y2+"/"+String(m2).padStart(2,"0")+"/"+String(d).padStart(2,"0"),WD2[dt.getDay()],ATT2[v.st]||v.st,v.in||"",v.out||"",v.meal?"\u25CB":"",v.s1?"\u5F80":"",v.s2?"\u5FA9":"",v.memo||""].map(esc).join(","));
      }
    });
    const blob=new Blob(["\uFEFF"+allLines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u30B5\u30FC\u30D3\u30B9\u63D0\u4F9B\u5B9F\u7E3E_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };
  return <div style={{padding:14}}>
    <Header title={"\u1F9EE \u56FD\u4FDD\u9023\u8ACB\u6C42 \u6708\u6B21\u96C6\u8A08"}>
      <GBtn onClick={dlCsv} disabled={rows.length===0} color="#1B5E20">📥 集計CSV</GBtn>
      <GBtn onClick={dlDetailCsv} disabled={rows.length===0} color="#0277BD">📋 実績詳細CSV</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
      <MonthNav ym={ym} setYm={setYm}/>
      <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
        <input type="checkbox" checked={onlyUsed} onChange={e=>setOnlyUsed(e.target.checked)} style={{accentColor:"#388E3C"}}/>実績のある利用者のみ表示
      </label>
    </div>
    <div className="np" style={{background:"#E3F2FD",border:"1px solid #90CAF9",borderRadius:5,padding:"5px 12px",marginBottom:8,fontSize:11,color:"#1565C0",lineHeight:1.7}}>
      🔗 この表は「実績記録」タブの入力から自動集計されます。国保連の簡易入力システム・請求ソフトへ入力する際の<b>転記・照合用</b>としてお使いください（このシステムから国保連へ直接送信はできません）。
    </div>
    <div className="print-only" style={{marginBottom:6}}>
      <div style={{textAlign:"center",fontSize:16,fontWeight:"bold"}}>国保連請求 月次集計表（{reiwaYM(ym)}分）</div>
      <div style={{textAlign:"right",fontSize:11}}>事業所番号：{OFFICE.officeNo||"\u3000\u3000\u3000"}　{OFFICE.svc}事業所　{OFFICE.name}</div>
    </div>
    <table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead><tr>
        <th style={th}>氏名</th><th style={{...th,width:"13%"}}>受給者証番号</th>
        <th style={{...th,width:"9%"}}>利用日数</th><th style={{...th,width:"10%"}}>うち施設外</th>
        <th style={{...th,width:"11%"}}>欠席時対応</th><th style={{...th,width:"10%"}}>食事提供</th>
        <th style={{...th,width:"9%"}}>送迎(往)</th><th style={{...th,width:"9%"}}>送迎(復)</th>
      </tr></thead>
      <tbody>
        {rows.length===0&&<tr><td colSpan={8} style={{...td,textAlign:"center",color:"#999",padding:14}}>この月の実績記録がありません。「実績記録」タブで入力してください。</td></tr>}
        {rows.map(r=><tr key={r.n}>
          <td style={td}>{r.n}</td>
          <td style={{...td,textAlign:"center",color:r.j?"#333":"#C62828",fontSize:10}}>{r.j||"\u672A\u5165\u529B"}</td>
          <td style={{...td,textAlign:"center",fontWeight:"bold"}}>{r.use}</td>
          <td style={{...td,textAlign:"center"}}>{r.out}</td>
          <td style={{...td,textAlign:"center",background:r.kasan>4?"#FFEBEE":"transparent",color:r.kasan>4?"#C62828":"#333",fontWeight:r.kasan>4?"bold":"normal"}}>{r.kasan}{r.kasan>4?" \u26A0\uFE0F":""}</td>
          <td style={{...td,textAlign:"center"}}>{r.meal}</td>
          <td style={{...td,textAlign:"center"}}>{r.s1}</td>
          <td style={{...td,textAlign:"center"}}>{r.s2}</td>
        </tr>)}
        {rows.length>0&&<tr style={{background:"#E8F5E9",fontWeight:"bold"}}>
          <td style={td}>合計（{rows.length}名）</td><td style={td}></td>
          <td style={{...td,textAlign:"center"}}>{total.use}</td><td style={{...td,textAlign:"center"}}>{total.out}</td>
          <td style={{...td,textAlign:"center"}}>{total.kasan}</td><td style={{...td,textAlign:"center"}}>{total.meal}</td>
          <td style={{...td,textAlign:"center"}}>{total.s1}</td><td style={{...td,textAlign:"center"}}>{total.s2}</td>
        </tr>}
      </tbody>
    </table>
    <div style={{marginTop:8,fontSize:10,color:"#888",lineHeight:1.7}}>
      ※ 欠席時対応加算は原則月4回まで（超過は赤色表示）。受給者証番号が未入力の方は「実績記録」タブで入力できます。<br/>
      ※ 算定要件（食事提供体制加算の届出、送迎加算の要件等）は最新の報酬告示・市町村の指導に従ってご確認ください。
    </div>
  </div>;
}

  const [q,setQ]=useState("");
  const saveHist=(list)=>{setHist(list);try{localStorage.setItem("kk_customer_complaints",JSON.stringify(list));}catch(e){}};
  const gen=async()=>{
    if(!body.trim()){alert("\u82E6\u60C5\u5185\u5BB9\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044");return;}
    setBusy(true);
    const prompt =
      "\u8CFC\u5165\u30BD\u30D5\u30C8\u306E\u304A\u5BA2\u69D8\u82E6\u60C5\u53D7\u4ED8\u3067\u3059\u3002\u4EE5\u4E0B\u306E\u5185\u5BB9\u3092\u3001\u7BA1\u7406\u8005\u3078\u901A\u77E5\u3059\u308B\u6587\u7AE0\u3068\u3057\u3066\u6574\u7406\u3057\u3066\u304F\u3060\u3055\u3044\u3002"+
      "\u51FA\u529B\u306F\u3010\u4EF6\u540D\u3011\u3010\u53D7\u4ED8\u65E5\u6642\u3011\u3010\u304A\u5BA2\u69D8\u60C5\u5831\u3011\u3010\u82E6\u60C5\u5185\u5BB9\u306E\u8981\u7D04\u3011\u3010\u7DCA\u6025\u5EA6\u3011\u3010\u7BA1\u7406\u8005\u5BFE\u5FDC\u6848\u3011\u3010\u304A\u5BA2\u69D8\u3078\u306E\u8FD4\u4FE1\u6587\u6848\u3011\u306E\u5F62\u5F0F\u3002"+
      "\u4E01\u5BE7\u3067\u8AA0\u5B9F\u306A\u65E5\u672C\u8A9E\u3002\u81EA\u52D5\u8FD4\u4FE1\u3067\u306F\u306A\u304F\u7BA1\u7406\u8005\u78BA\u8A8D\u524D\u63D0\u3002"+
      "\n\u901A\u77E5\u5148:"+ADMIN_MAIL+
      "\n\u304A\u5BA2\u69D8\u540D:"+customer+
      "\n\u4F1A\u793E\u540D:"+company+
      "\n\u30E1\u30FC\u30EB:"+email+
      "\n\u8CFC\u5165\u30BD\u30D5\u30C8:"+soft+
      "\n\u82E6\u60C5\u533A\u5206:"+ctype+
      "\n\u7DCA\u6025\u5EA6:"+priority+
      "\n\u82E6\u60C5\u5185\u5BB9:"+body+
      "\n\u5E0C\u671B\u5BFE\u5FDC:"+request;
    const r=await ai(prompt);
    const text=(r&&r.trim()) ? r.trim() :
      "\u4EF6\u540D\uFF1A\u3010\u82E6\u60C5\u53D7\u4ED8\u3011"+(soft||"\u8CFC\u5165\u30BD\u30D5\u30C8")+"\uFF0F"+(company||"\u672A\u5165\u529B")+"\uFF0F"+(customer||"\u672A\u5165\u529B")+"\u69D8\n\n"+
      "\u9001\u4FE1\u5148\uFF1A"+ADMIN_MAIL+"\n\n"+
      "\u3010\u53D7\u4ED8\u65E5\u6642\u3011\n"+new Date().toLocaleString("ja-JP")+"\n\n"+
      "\u3010\u304A\u5BA2\u69D8\u60C5\u5831\u3011\n\u304A\u5BA2\u69D8\u540D\uFF1A"+(customer||"\u672A\u5165\u529B")+"\n\u4F1A\u793E\u540D\u30FB\u4E8B\u696D\u6240\u540D\uFF1A"+(company||"\u672A\u5165\u529B")+"\n\u30E1\u30FC\u30EB\uFF1A"+(email||"\u672A\u5165\u529B")+"\n\u8CFC\u5165\u30BD\u30D5\u30C8\uFF1A"+(soft||"\u672A\u5165\u529B")+"\n\n"+
      "\u3010\u82E6\u60C5\u533A\u5206\u3011\n"+ctype+"\n\n\u3010\u7DCA\u6025\u5EA6\u3011\n"+priority+"\n\n\u3010\u82E6\u60C5\u5185\u5BB9\u3011\n"+body+"\n\n\u3010\u5E0C\u671B\u3059\u308B\u5BFE\u5FDC\u3011\n"+(request||"\u672A\u5165\u529B")+"\n\n"+
      "\u3010\u7BA1\u7406\u8005\u5BFE\u5FDC\u6848\u3011\n1. \u5185\u5BB9\u78BA\u8A8D\n2. \u304A\u5BA2\u69D8\u3078\u53D7\u4ED8\u9023\u7D61\n3. \u4E0D\u5177\u5408\u78BA\u8A8D\n4. \u5BFE\u5FDC\u65B9\u91DD\u6C7A\u5B9A\n5. \u518D\u767A\u9632\u6B62\u7B56\u3092\u8A18\u9332\n\n"+
      "\u3010\u8FD4\u4FE1\u6587\u6848\u3011\n"+(customer||"\u304A\u5BA2\u69D8")+"\u69D8\n\n\u3053\u306E\u305F\u3073\u306F\u3054\u4E0D\u4FBF\u30FB\u3054\u5FC3\u914D\u3092\u304A\u304B\u3051\u3057\u3001\u8AA0\u306B\u7533\u3057\u8A33\u3054\u3056\u3044\u307E\u305B\u3093\u3002\n\u3054\u9023\u7D61\u3044\u305F\u3060\u3044\u305F\u5185\u5BB9\u3092\u78BA\u8A8D\u3044\u305F\u3057\u307E\u3057\u305F\u3002\n\u78BA\u8A8D\u306E\u3046\u3048\u3001\u5FC5\u8981\u306A\u5BFE\u5FDC\u3092\u9032\u3081\u3055\u305B\u3066\u3044\u305F\u3060\u304D\u307E\u3059\u3002\n\n\u7BA1\u7406\u8005\n\u677E\u5143 \u5B5D\u4EC1\n\u901A\u77E5\u5148\uFF1A"+ADMIN_MAIL+"\n\n\u203B\u3053\u306E\u6587\u7AE0\u306FAI\u4F5C\u6210\u6848\u3067\u3059\u3002\u9001\u4FE1\u524D\u306B\u5FC5\u305A\u7BA1\u7406\u8005\u304C\u78BA\u8A8D\u3057\u3066\u304F\u3060\u3055\u3044\u3002";

  const filtered=hist.filter(h=>(h.date+h.customer+h.company+h.email+h.soft+h.ctype+h.text).toLowerCase().includes(q.toLowerCase()));

          .select("user_name,content").eq("facility_id",facility.id).eq("data_type","plan");

        if(assessRows&&assessRows.length>0){

      const next = typeof dataOrFn === 'function' ? dataOrFn(cur) : dataOrFn;
      return {...prev, [sel]: next};
    });
  };

  // ===== 自動保存 =====

  useEffect(()=>{
    if(!sel) return;
    const snap={iko,hoshin,long,short,g1t,g1r1,g1r2,g1f,g1to,g2t,g2r1,g2r2,g2f,g2to,f5_1a,f5_1b,f5_2a,f5_2b,f5_3a,f5_3b,f5_4a,f5_4b,f5_5a,f5_5b,mon1,mon2,mj1,mk1,mj2,mk2,kadai,cf,ct,catt,cg1i,cg1k,cg2i,cg2k,cbikou,recs,disab,disabMemo,att,jukyu};
    setAllData(p=>({...p,[sel]:snap}));
  },[sel,iko,hoshin,long,short,g1t,g1r1,g1r2,g1f,g1to,g2t,g2r1,g2r2,g2f,g2to,f5_1a,f5_1b,f5_2a,f5_2b,f5_3a,f5_3b,f5_4a,f5_4b,f5_5a,f5_5b,mon1,mon2,mj1,mk1,mj2,mk2,kadai,cf,ct,catt,cg1i,cg1k,cg2i,cg2k,cbikou,recs,disab,disabMemo,att,jukyu]);
  // 全利用者データ → localStorage + Supabase自動保存（1秒デバウンス）
  useEffect(()=>{
    const t=setTimeout(async()=>{
      try{
        localStorage.setItem(officeKey("alldata"),JSON.stringify(allData));

            facility_name:office.name||facility.facility_name,

            shidoin:office.shidoin||""
          }).eq("id",facility.id);
          // 全利用者データをsupport_dataテーブルへ保存
          const upserts=Object.entries(allData).map(([userName,data])=>({
            facility_id:facility.id,
            user_name:userName,
            data_type:"plan",
            content:data,
            updated_at:new Date().toISOString()

            await supabase.from("support_data").upsert(upserts,{onConflict:"facility_id,user_name,data_type"});

          // アセスメントデータも保存
          const assessUpserts=Object.entries(allAssess).map(([userName,data])=>({
            facility_id:facility.id,
            user_name:userName,
            data_type:"assess",
            content:data,
            updated_at:new Date().toISOString()

    const u=allData[name];
    if(u && PLAN_KEYS.some(k=>{

      if(k==="catt") return Array.isArray(v)&&v.some(x=>x&&x.n&&x.n.trim());
      if(k==="att") return v&&typeof v==="object"&&Object.values(v).some(mm=>mm&&Object.keys(mm).length>0);
      if(Array.isArray(v)) return v.length>0;
      return typeof v==="string"&&v.trim();

    setNames([...names,name]);

  const renameUser=(old)=>{

    if(!n||!n.trim()||n.trim()===old)return;
    const name=n.trim();
    if(names.includes(name)){alert("\u540C\u3058\u6C0F\u540D\u304C\u3059\u3067\u306B\u540D\u7C3F\u306B\u3042\u308A\u307E\u3059");return;}
    setNames(names.map(x=>x===old?name:x));
    setAllData(p=>{if(!p[old])return p;const q={...p};q[name]=q[old];delete q[old];return q;});
    setAllAssess(p=>{if(!p[old])return p;const q={...p};q[name]=q[old];delete q[old];return q;});
    if(sel===old)setSel(name);

            {n}{hasData(n)&&<span style={{fontSize:9,marginLeft:3,color:"#A5D6A7"}}>●</span>}
          </button>
        ))}
      </div>
      <div style={{padding:"4px 8px",fontSize:9,color:"rgba(255,255,255,0.45)",textAlign:"center",borderTop:"1px solid rgba(255,255,255,0.1)"}}>利用者 {names.length}名</div>
      <div style={{padding:"6px 8px",borderTop:"1px solid rgba(255,255,255,0.15)",display:"flex",flexDirection:"column",gap:4}}>
        <div style={{fontSize:9,color:"#A5D6A7",textAlign:"center"}}>{savedAt?"\u2601\uFE0F \u30AF\u30E9\u30A6\u30C9\u4FDD\u5B58 "+savedAt:"\u2601\uFE0F \u30AF\u30E9\u30A6\u30C9\u4FDD\u5B58\uFF1A\u30AA\u30F3"}</div>
        <button onClick={()=>setOfficeOpen(true)} style={{width:"100%",padding:"5px 6px",fontSize:10,fontWeight:"bold",background:"#FFE082",color:"#5D4037",border:"none",borderRadius:4,cursor:"pointer"}}>🏢 事業所設定</button>
        <button onClick={backupAll} style={{width:"100%",padding:"5px 6px",fontSize:10,fontWeight:"bold",background:"#A5D6A7",color:G,border:"none",borderRadius:4,cursor:"pointer"}}>💾 バックアップ</button>
        <button onClick={restoreAll} style={{width:"100%",padding:"5px 6px",fontSize:10,fontWeight:"bold",background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:4,cursor:"pointer"}}>📂 復元</button>
        <button onClick={()=>{if(window.confirm("\u30ED\u30B0\u30A2\u30A6\u30C8\u3057\u307E\u3059\u304B\uFF1F"))onLogout();}} style={{width:"100%",padding:"5px 6px",fontSize:10,fontWeight:"bold",background:"rgba(244,67,54,0.3)",color:"#fff",border:"none",borderRadius:4,cursor:"pointer"}}>🚪 ログアウト</button>
      </div>
      <div style={{padding:"5px 8px",borderTop:"1px solid rgba(255,255,255,0.1)",fontSize:9,color:"rgba(255,255,255,0.3)"}}>{facility&&facility.license_key ? "\u1F510 \u30E9\u30A4\u30BB\u30F3\u30B9\uFF1A"+facility.license_key : (facility&&facility.email)}</div>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <div className="np" style={{display:"flex",background:"#fff",borderBottom:"2px solid #C8E6C9",flexShrink:0,overflowX:"auto"}}>
        {TABS.map(([icon,label],i)=><button key={i} onClick={()=>setTab(i)} style={{padding:"9px 10px",border:"none",cursor:"pointer",fontSize:11,fontWeight:tab===i?"bold":"normal",background:"transparent",color:tab===i?G:"#888",borderBottom:tab===i?"3px solid #388E3C":"3px solid transparent",whiteSpace:"nowrap"}}>{icon} {label}</button>)}
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {!sel&&tab!==9&&tab!==17&&<div style={{textAlign:"center",paddingTop:50,color:"#888",fontSize:14}}>
          {names.length===0?<div style={{display:"inline-block",textAlign:"left",background:"#fff",border:"1px solid #C8E6C9",borderRadius:8,padding:"18px 24px",lineHeight:2.1,fontSize:13}}>
            <div style={{fontWeight:"bold",color:G,fontSize:15,marginBottom:6}}>🌱 はじめての設定（3ステップ）</div>
            ① 左下の <b style={{color:"#5D4037"}}>🏢 事業所設定</b> で事業所名・サービス管理責任者を記入<br/>
            ② 左上の <b style={{color:G}}>⚙️ 編集</b> → <b>➕ 追加</b> または <b>📋 一括入替</b> で利用者を登録<br/>
            ③ 利用者を選んで記録を開始（入力は自動保存されます）<br/>
            <div style={{fontSize:11,color:"#999",marginTop:8}}>💾 控えや別PCへの引っ越しは左下の「全データ保存／復元」をご利用ください</div>
          </div>:<span>← 利用者を選択してください<br/>
          <span style={{fontSize:12,color:"#A5D6A7"}}>● 印はデータ入力済みの利用者です</span><br/>
          <span style={{fontSize:11,color:"#bbb",display:"inline-block",marginTop:14,lineHeight:1.9}}>💾 入力内容はこのブラウザに自動保存されます<br/>別のパソコンへ移す時や念のための控えには<br/>左下の「全データ保存」をご利用ください</span></span>}
        </div>}
        {sel&&tab===0&&<PlanTab d={d} s={s}/>}
        {sel&&tab===1&&<MonTab d={d} s={s}/>}
        {sel&&tab===2&&<MendanTab d={d} s={s}/>}
        {sel&&tab===3&&<RecTab sel={sel} list={recs} setList={setRecs} planData={{g1t,g2t,long:long,short:short}} att={att} setAtt={setAtt}/>}
        {sel&&tab===4&&<DisabTab sel={sel} disab={disab} setDisab={setDisab} memo={disabMemo} setMemo={setDisabMemo} setAssessData={setAssessData} goAssess={()=>setTab(5)}/>}
        {sel&&tab===5&&<AssessTab sel={sel} data={assessData} setData={setAssessData} onLinkPlan={linkAssessToplan}/>}
        {sel&&tab===6&&<CaseTab d={d} s={s}/>}
        {sel&&tab===7&&<DocTab d={d} s={s}/>}
        {sel&&tab===8&&<AttTab sel={sel} att={att} setAtt={setAtt} jukyu={jukyu} setJukyu={setJukyu}/>}
        {tab===9&&<BillTab names={names} allData={allData}/>}
        {tab===10&&<WageTab names={names} allData={allData} setAllData={setAllData} office={office}/>}
        {tab===11&&<WageDetailTab sel={sel} att={att} names={names} allData={allData} office={office}/>}
        {tab===12&&<InvoiceTab names={names} allData={allData} office={office}/>}
        {tab===13&&<KyufuTab names={names} allData={allData} office={office}/>}
        {tab===14&&<ZaittakuTab sel={sel} names={names} allData={allData} setAllData={setAllData} att={att} setAtt={setAtt} office={office}/>}
        {tab===15&&<OutsideTab names={names} allData={allData} office={office}/>}
        {tab===16&&<KaikinTab names={names} allData={allData} office={office}/>}
        {tab===17&&<CustomerComplaintTab/>}
      </div>
    </div>
    {officeOpen&&<div className="np" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setOfficeOpen(false)}>
      <div style={{background:"#fff",borderRadius:8,padding:18,width:440,maxWidth:"92vw",maxHeight:"88vh",overflowY:"auto",display:"flex",flexDirection:"column",gap:10}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:"bold",color:G}}>🏢 事業所設定</div>
        <div style={{fontSize:11,color:"#666",lineHeight:1.7}}>ここで設定した内容は、画面表示・印刷帳票（個別支援計画書・ケース会議・面談記録・工賃明細書）・AI生成のすべてに自動で反映されます。入力は自動保存されます。</div>
        {[["\u6CD5\u4EBA\u540D","houjin","\u4F8B\uFF1A\u682A\u5F0F\u4F1A\u793E\u3007\u3007 / \u793E\u4F1A\u798F\u7949\u6CD5\u4EBA\u3007\u3007"],["\u4E8B\u696D\u6240\u540D","name","\u4F8B\uFF1A\u3007\u3007\u4F5C\u696D\u6240"],["\u4E8B\u696D\u6240\u756A\u53F7\uFF0810\u6841\uFF09","officeNo","\u4F8B\uFF1A4510123456"],["\u30B5\u30FC\u30D3\u30B9\u7A2E\u5225","svc","\u4F8B\uFF1A\u5C31\u52B4\u7D99\u7D9A\u652F\u63F4B\u578B"],["\u7BA1\u7406\u8005\u6C0F\u540D","kanriName","\u4F8B\uFF1A\u677E\u5143 \u5B5D\u4EC1"],["\u30B5\u30FC\u30D3\u30B9\u7BA1\u7406\u8CAC\u4EFB\u8005","kanri","\u4F8B\uFF1A\u5BAE\u5D0E \u82B1\u5B50"],["\u4F1A\u8B70\u30FB\u9762\u8AC7\u306E\u958B\u50AC\u5834\u6240","place","\u4F8B\uFF1A\u3007\u3007\u4F5C\u696D\u6240\u3000\u76F8\u8AC7\u5BA4"],["\u76EE\u6A19\u5DE5\u8CC3\u9054\u6210\u6307\u5C0E\u54E1\uFF08\u4EFB\u610F\uFF09","shidoin","\u4F8B\uFF1A\u5BAE\u5D0E \u592A\u90CE"]].map(([label,key,ph])=>(
          <div key={key}>
            <div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>{label}</div>
            <input value={office[key]||""} onChange={e=>upOff(key,e.target.value)} placeholder={ph}
              style={{width:"100%",padding:"7px 9px",fontSize:12,border:"1px solid #C8E6C9",borderRadius:5}}/>
          </div>
        ))}
        <div style={{background:"#F1F8E9",border:"1px solid #C8E6C9",borderRadius:5,padding:"7px 10px",fontSize:10,color:"#33691E",lineHeight:1.7}}>
          反映例：法人名 →「{office.houjin||"\uFF08\u672A\u8A2D\u5B9A\uFF09"}」／事業所名欄 →「{(office.svc||"")+"\u4E8B\u696D\u6240\u3000"+(office.name||"\uFF08\u672A\u8A2D\u5B9A\uFF09")}」／サービス管理責任者氏名 →「{office.kanri||"\uFF08\u672A\u8A2D\u5B9A\uFF09"}」
        </div>
        <div style={{borderTop:"1px solid #eee",paddingTop:10,display:"flex",flexDirection:"column",gap:6}}>
          <div style={{fontSize:11,fontWeight:"bold",color:"#C62828"}}>別の事業所として使い始める場合</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={clearOffice} style={{flex:1,padding:"7px 8px",fontSize:11,background:"#FFF3E0",color:"#E65100",border:"1px solid #FFB74D",borderRadius:4,cursor:"pointer"}}>事業所設定をクリア</button>
            <button onClick={resetAll} style={{flex:1,padding:"7px 8px",fontSize:11,fontWeight:"bold",background:"#FFEBEE",color:"#C62828",border:"1px solid #EF9A9A",borderRadius:4,cursor:"pointer"}}>⚠️ 全データ初期化</button>
          </div>
          <div style={{fontSize:10,color:"#888",lineHeight:1.6}}>「全データ初期化」は利用者名簿と入力データをすべて削除し、新しい事業所として最初から始めます（実行前に必ず控えの保存をおすすめします）。</div>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={()=>setOfficeOpen(false)} style={{padding:"8px 20px",fontSize:12,fontWeight:"bold",background:GM,color:"#fff",border:"none",borderRadius:4,cursor:"pointer"}}>✅ 閉じる（保存済み）</button>
        </div>
      </div>
    </div>}
    {bulkOpen&&<div className="np" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setBulkOpen(false)}>
      <div style={{background:"#fff",borderRadius:8,padding:18,width:420,maxWidth:"92vw",maxHeight:"86vh",display:"flex",flexDirection:"column",gap:10}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:"bold",color:G}}>📋 利用者名簿の一括入れ替え</div>
        <div style={{fontSize:11,color:"#666",lineHeight:1.7}}>
          1行に1名ずつ氏名を入力してください（現在の名簿が入っています）。<br/>
          Excelの氏名列をコピーしてそのまま貼り付けることもできます。<br/>
          <span style={{color:"#E65100"}}>※名簿から外れた方のデータは削除されず保管され、同じ氏名で再追加すると復元されます。</span>
        </div>
        <textarea value={bulkText} onChange={e=>setBulkText(e.target.value)} rows={15}
          style={{width:"100%",padding:"8px 10px",fontSize:12,border:"1px solid #C8E6C9",borderRadius:5,resize:"vertical",lineHeight:1.7,fontFamily:"Meiryo,sans-serif"}}/>
        <div style={{fontSize:10,color:"#888"}}>現在 {bulkText.split(/\r?\n/).map(x=>x.trim()).filter(Boolean).length} 名</div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button onClick={()=>setBulkOpen(false)} style={{padding:"7px 16px",fontSize:12,background:"#eee",border:"none",borderRadius:4,cursor:"pointer"}}>キャンセル</button>
          <button onClick={applyBulk} style={{padding:"7px 16px",fontSize:12,fontWeight:"bold",background:GM,color:"#fff",border:"none",borderRadius:4,cursor:"pointer"}}>この名簿に入れ替える</button>
        </div>
      </div>
    </div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<AppRoot/>);
</script>
</body>
</html>
