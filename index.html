<script>
// ===== Google Apps Script ライセンス認証 =====
var GAS_URL = "https://script.google.com/macros/s/AKfycbzBqfSjNrZO8eMMueuvP7IAHnT6f8JiY6F9faUeYq-nphNQcrGBVX8Hzf1SsFjK8BbD/exec";

function kkShowMain(){
  var gate = document.getElementById("licenseGate");
  var root = document.getElementById("root");
  if(gate) gate.style.display = "none";
  if(root) root.style.display = "block";
}

function kkCheck(){
  var input = document.getElementById("licenseInput");
  var msg = document.getElementById("licenseMessage");
  var btn = document.getElementById("licenseBtn");
  var key = input.value.trim().toUpperCase();
  msg.style.color = "#1565C0";

  if(!key){
    msg.style.color = "#C62828";
    msg.innerHTML = "❌ ライセンスキーを入力してください。";
    return;
  }

  msg.innerHTML = "⏳ 認証中です。しばらくお待ちください...";
  btn.disabled = true;

  var cbName = "kkCb_" + Date.now();
  var sc = document.createElement("script");
  var tm = setTimeout(function(){
    btn.disabled = false;
    msg.style.color = "#C62828";
    msg.innerHTML = "❌ タイムアウトです。ネット接続を確認してください。";
    delete window[cbName];
    if(sc.parentNode) sc.parentNode.removeChild(sc);
  }, 15000);

  window[cbName] = function(data){
    clearTimeout(tm);
    btn.disabled = false;
    delete window[cbName];
    if(sc.parentNode) sc.parentNode.removeChild(sc);
    if(data.ok){
      localStorage.setItem("kk_lic_key", key);
      localStorage.setItem("kk_lic_plan", data.plan || "");
      localStorage.setItem("kk_lic_customer", data.customer || "");
      msg.style.color = "#1B5E20";
      msg.innerHTML = "✅ 認証成功！【" + (data.plan||"") + "】" + (data.customer ? data.customer + "様" : "");
      setTimeout(kkShowMain, 1200);
    } else {
      msg.style.color = "#C62828";
      msg.innerHTML = "❌ " + (data.message || "認証に失敗しました。");
    }
  };

  sc.onerror = function(){
    clearTimeout(tm);
    btn.disabled = false;
    msg.style.color = "#C62828";
    msg.innerHTML = "❌ 通信エラーです。ネット接続を確認してください。";
    delete window[cbName];
  };

  sc.src = GAS_URL + "?key=" + encodeURIComponent(key) + "&callback=" + cbName;
  document.head.appendChild(sc);
}

function kkReset(){
  localStorage.removeItem("kk_lic_key");
  localStorage.removeItem("kk_lic_plan");
  localStorage.removeItem("kk_lic_customer");
  var msg = document.getElementById("licenseMessage");
  var input = document.getElementById("licenseInput");
  msg.style.color = "#1B5E20";
  msg.innerHTML = "✅ リセットしました。新しいキーを入力してください。";
  input.value = "";
  input.focus();
}

document.addEventListener("DOMContentLoaded", function(){
  var btn = document.getElementById("licenseBtn");
  var rst = document.getElementById("resetBtn");
  var inp = document.getElementById("licenseInput");
  if(btn) btn.addEventListener("click", kkCheck);
  if(rst) rst.addEventListener("click", kkReset);
  if(inp) inp.addEventListener("keydown", function(e){ if(e.key === "Enter") kkCheck(); });

  // 保存済みキーで自動認証
  var saved = localStorage.getItem("kk_lic_key");
  if(saved){
    var cbAuto = "kkAuto_" + Date.now();
    var scAuto = document.createElement("script");
    var tmAuto = setTimeout(function(){
      delete window[cbAuto];
      if(scAuto.parentNode) scAuto.parentNode.removeChild(scAuto);
      kkShowMain();
    }, 8000);
    window[cbAuto] = function(data){
      clearTimeout(tmAuto);
      delete window[cbAuto];
      if(scAuto.parentNode) scAuto.parentNode.removeChild(scAuto);
      if(data.ok){ kkShowMain(); return; }
      localStorage.removeItem("kk_lic_key");
      var root = document.getElementById("root");
      if(root) root.style.display = "none";
    };
    scAuto.src = GAS_URL + "?key=" + encodeURIComponent(saved) + "&callback=" + cbAuto;
    document.head.appendChild(scAuto);
  } else {
    var root = document.getElementById("root");
    if(root) root.style.display = "none";
  }
});
</script>

function saveJSON(name, data) {
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = name + ".json"; a.click();
  URL.revokeObjectURL(url);
}
function loadJSON(callback) {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try { callback(JSON.parse(ev.target.result)); }
      catch(err) { alert("\u8AAD\u8FBC\u30A8\u30E9\u30FC: " + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===== 支援記録 =====
function RecTab({sel,list,setList,planData,att,setAtt}){
  const today=new Date();
  const todayKey=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0");
  const todayDay=today.getDate();
  // 今日の実績記録から支援内容を初期値として取得
  const todayMemo=(att[todayKey]||{})[todayDay]?.memo||"";
  const [rec,setRec]=useState(todayMemo);
  const [res,setRes]=useState(""); const [busy,setBusy]=useState(false);
  // 実績記録の今日の支援内容が変わったらrecに反映
  React.useEffect(()=>{
    const m=(att[todayKey]||{})[todayDay]?.memo||"";
    if(m&&!rec) setRec(m);
  },[att]);
  const gen=async()=>{setBusy(true);const r=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+sel+"\u300D\u3002\u8A18\u9332\uFF1A\u300C"+rec+"\u300D\u3002\u3010\u672C\u65E5\u306E\u69D8\u5B50\u3011\u3010\u652F\u63F4\u5185\u5BB9\u3011\u3010\u4ECA\u5F8C\u306E\u7559\u610F\u70B9\u3011\u306E3\u9805\u76EE\u3067\u6574\u7406\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r)setRes(r.trim());setBusy(false);};
  const save=()=>{
    if(!rec)return;
    const text=res||rec;
    const newList=[{date:today.toLocaleDateString("ja-JP"),text},...list];
    setList(newList);
    // 実績記録の今日のmemoにも反映
    if(setAtt){
      setAtt(prev=>{
        const prevMonth=prev[todayKey]||{};
        const prevDay=prevMonth[todayDay]||{};
        return {...prev,[todayKey]:{...prevMonth,[todayDay]:{...prevDay,memo:text}}};
      });
    }
    setRec("");setRes("");
  };
  const del=(i)=>{if(window.confirm(list[i].date+" \u306E\u8A18\u9332\u3092\u524A\u9664\u3057\u307E\u3059\u304B\uFF1F")){setList(list.filter((_,j)=>j!==i));}};
  return <div style={{padding:14}}>
    <Header title={"\u1F4DD \u652F\u63F4\u8A18\u9332 \u2015 "+sel}>
      <GBtn onClick={()=>saveJSON(sel+"_\u652F\u63F4\u8A18\u9332",list)} disabled={list.length===0} color={G}>💾 一覧保存</GBtn>
      <button onClick={()=>loadJSON(data=>{if(Array.isArray(data)){setList(data);alert("\u8AAD\u8FBC\u5B8C\u4E86");}})} style={{padding:"6px 12px",background:"#5C6BC0",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:12,fontWeight:"bold"}}>📂 読込</button>
      <PrtBtn/>
    </Header>
    {/* ▼ 支援目標・支援計画書の要点（上部表示） */}
    {planData&&(planData.g1t||planData.g2t||planData.short||planData.long)&&
    <div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:6,padding:"9px 12px",marginBottom:10,fontSize:11}}>
      <div style={{fontWeight:"bold",color:"#1B5E20",marginBottom:6}}>📋 ○支援目標及び支援計画書（参照）</div>
      {planData.long&&<div style={{marginBottom:3}}><span style={{fontWeight:"bold",color:"#388E3C"}}>長期目標：</span>{planData.long}</div>}
      {planData.short&&<div style={{marginBottom:3}}><span style={{fontWeight:"bold",color:"#388E3C"}}>短期目標：</span>{planData.short}</div>}
      {planData.g1t&&<div style={{marginBottom:2}}><span style={{fontWeight:"bold",color:"#1B5E20"}}>支援目標①：</span>{planData.g1t}</div>}
      {planData.g2t&&<div><span style={{fontWeight:"bold",color:"#1B5E20"}}>支援目標②：</span>{planData.g2t}</div>}
    </div>}
    <div style={{marginBottom:8}}><div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>本日の記録（支援内容）</div><PA v={rec} s={setRec} rows={6}/></div>
    <div style={{display:"flex",gap:8,marginBottom:12}}>
      <GBtn onClick={gen} disabled={!rec} busy={busy}>🤖 AIで整理</GBtn>
      <GBtn onClick={save} disabled={!rec} color={G}>💾 保存</GBtn>
    </div>
    {res&&<div style={{background:"#FFFDE7",border:"1px solid #F9A825",borderRadius:5,padding:10,marginBottom:12}}><div style={{fontSize:10,color:"#E65100",fontWeight:"bold",marginBottom:4}}>🤖 AI整理済み</div><pre style={{margin:0,whiteSpace:"pre-wrap",fontSize:12}}>{res}</pre></div>}
    {list.length>0&&<div style={{fontSize:11,color:"#888",marginBottom:6}}>記録 {list.length}件（自動保存済み）</div>}
    {list.map((r,i)=><div key={i} style={{border:"1px solid #C8E6C9",borderRadius:5,marginBottom:8,overflow:"hidden"}}>
      <div style={{background:GP,padding:"4px 10px",fontSize:10,fontWeight:"bold",color:G,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>{r.date}</span>
        <button className="np" onClick={()=>del(i)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:11,color:"#C62828"}}>🗑 削除</button>
      </div>
      {/* 支援内容全文表示 */}
      <pre style={{margin:0,padding:"7px 10px",whiteSpace:"pre-wrap",fontSize:12,color:"#444",wordBreak:"break-word",maxHeight:"none"}}>{r.text}</pre>
    </div>)}
  </div>;
}

// ===== アセスメント =====
function AssessTab({sel,data,setData,onLinkPlan}){
  const [busy,setBusy]=useState("");
  const [loadedAssess,setLoadedAssess]=useState(null);
  // 戻る機能：変更履歴スタック（最大10件）
  const [undoStack,setUndoStack]=useState([]);
  const pushUndo = (prevData) => {
    setUndoStack(stack=>[...stack.slice(-9), JSON.stringify(prevData)]);
  };
  const handleUndo = () => {
    if(undoStack.length===0){ alert("\u3053\u308C\u4EE5\u4E0A\u623B\u308C\u307E\u305B\u3093"); return; }
    const prev = JSON.parse(undoStack[undoStack.length-1]);
    setData(prev);
    setUndoStack(stack=>stack.slice(0,-1));
  };
  const PC={"\u25CE":"#E65100","\u25CB":"#1565C0","\u25B3":"#757575"};
  const gen=async(item)=>{if(!data[item].cur)return;setBusy(item);const r=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+sel+"\u300D\u3002\u30A2\u30BB\u30B9\u30E1\u30F3\u30C8\u9805\u76EE\uFF1A"+item+"\u3002\u73FE\u72B6\uFF1A\u300C"+data[item].cur+"\u300D\u3002\u652F\u63F4\u4E0A\u306E\u8AB2\u984C\u30FB\u7559\u610F\u70B9\u3092\u2460\u301C\u2464\u306E\u7B87\u6761\u66F8\u304D\u3067\u66F8\u304D\u6700\u5F8C\u306B\u26A0\u7559\u610F\u70B9\u30921\u3064\u8FFD\u8A18\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r)setData(d=>({...d,[item]:{...d[item],issue:r.trim()}}));setBusy("");};
  return <div style={{padding:14}}>
    <Header title={"\u1F50D \u30A2\u30BB\u30B9\u30E1\u30F3\u30C8\u30B7\u30FC\u30C8 \u2015 "+sel}>
      <GBtn onClick={async()=>{
        pushUndo(data);
        for(const item of AI_ITEMS){
          if(!data[item].cur) continue;
          setBusy(item);
          const r=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+sel+"\u300D\u3002\u30A2\u30BB\u30B9\u30E1\u30F3\u30C8\u9805\u76EE\uFF1A"+item+"\u3002\u73FE\u72B6\uFF1A\u300C"+data[item].cur+"\u300D\u3002\u652F\u63F4\u4E0A\u306E\u8AB2\u984C\u30FB\u7559\u610F\u70B9\u3092\u2460\u301C\u2464\u306E\u7B87\u6761\u66F8\u304D\u3067\u66F8\u304D\u6700\u5F8C\u306B\u26A0\u7559\u610F\u70B9\u30921\u3064\u8FFD\u8A18\u3002\u6587\u7AE0\u306E\u307F\u3002");
          if(r)setData(d=>({...d,[item]:{...d[item],issue:r.trim()}}));
          setBusy("");
        }
      }} busy={!!busy}>🤖 AI一括生成</GBtn>
      <GBtn onClick={()=>onLinkPlan&&onLinkPlan(data)}
        color="#E65100"
        disabled={!Object.values(data).some(v=>v.cur)}>
        📋 個別支援計画書へAI反映
      </GBtn>
      <button onClick={handleUndo} disabled={undoStack.length===0}
        style={{padding:"6px 12px",background:undoStack.length===0?"#ccc":"#5C6BC0",
          color:"#fff",border:"none",borderRadius:4,cursor:undoStack.length===0?"not-allowed":"pointer",
          fontSize:12,fontWeight:"bold"}}>
        ↩️ 戻る({undoStack.length})
      </button>
      <div style={{display:"flex",gap:4}}>
        {loadedAssess&&<button onClick={()=>saveJSON(loadedAssess,data)} style={{padding:"6px 12px",background:"#E65100",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:12,fontWeight:"bold"}}>♻️ 上書保存</button>}
        <GBtn onClick={()=>saveJSON(sel+"_\u30A2\u30BB\u30B9\u30E1\u30F3\u30C8",data)} color={G}>💾 新規保存</GBtn>
        <button onClick={()=>loadJSON(d=>{setData(d);setLoadedAssess(sel+"_\u30A2\u30BB\u30B9\u30E1\u30F3\u30C8");alert("\u8AAD\u8FBC\u5B8C\u4E86");})} style={{padding:"6px 12px",background:"#5C6BC0",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:12,fontWeight:"bold"}}>📂 読込</button>
      </div>
      <PrtBtn/>
    </Header>
    {AI_ITEMS.map(item=>(
      <div key={item} className="assess-item" style={{border:"1px solid #C8E6C9",borderRadius:6,marginBottom:10,overflow:"visible"}}>

            {["\u25CE","\u25CB","\u25B3"].map(p=><button key={p} className="assess-pri-btn" onClick={()=>setData(d=>({...d,[item]:{...d[item],pri:p}}))} style={{padding:"2px 8px",fontSize:11,fontWeight:"bold",border:"none",borderRadius:3,cursor:"pointer",background:data[item].pri===p?PC[p]:"rgba(255,255,255,0.25)",color:data[item].pri===p?"#fff":"rgba(255,255,255,0.7)"}}>{p}</button>)}
            <button onClick={()=>{
              if(window.confirm("\u300C"+item+"\u300D\u306E\u5165\u529B\u5185\u5BB9\u3092\u3059\u3079\u3066\u6D88\u53BB\u3057\u307E\u3059\u304B\uFF1F")){
                pushUndo(data);
                setData(d=>({...d,[item]:{cur:"",issue:"",pri:"\u25CB"}}));
              }
            }} style={{padding:"2px 8px",fontSize:11,fontWeight:"bold",border:"none",borderRadius:3,cursor:"pointer",background:"rgba(255,200,200,0.4)",color:"#fff"}}>🗑️ 消去</button>
          </div>
        </div>
        <div style={{padding:8}}>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:4,borderLeft:"3px solid "+GM,paddingLeft:6}}>現状・本人意向</div>
            <PA v={data[item].cur} s={v=>setData(d=>({...d,[item]:{...d[item],cur:v}}))} rows={4}/>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:"bold",color:"#E65100",marginBottom:4,borderLeft:"3px solid #F9A825",paddingLeft:6}}>支援上の課題・留意点</div>
            <PA v={data[item].issue} s={v=>setData(d=>({...d,[item]:{...d[item],issue:v}}))} rows={5} yellow={true}/>
          </div>
        </div>
      </div>
    ))}
  </div>;
}

function DisabTab({sel,disab,setDisab,memo,setMemo,setAssessData,goAssess}){
  const [open,setOpen]=useState({});
  const toggle=(name)=>setDisab(disab.includes(name)?disab.filter(x=>x!==name):[...disab,name]);
  const reflect=()=>{
    const chosen=DISAB_GROUPS.flatMap(g=>g.items).filter(it=>disab.includes(it.n));
    if(chosen.length===0){alert("\u8A72\u5F53\u3059\u308B\u969C\u5BB3\u306B\u30C1\u30A7\u30C3\u30AF\u3092\u5165\u308C\u3066\u304F\u3060\u3055\u3044");return;}
    const names=chosen.map(it=>"\u30FB"+it.n).join("\n");
    if(!window.confirm("\u4EE5\u4E0B\u306E\u969C\u5BB3\u7279\u6027\u3092\u30A2\u30BB\u30B9\u30E1\u30F3\u30C8\u30B7\u30FC\u30C8\u306E\n\u3010\u73FE\u72B6\u30FB\u672C\u4EBA\u610F\u5411\u3011\u6B04\u3078\u8FFD\u8A18\u3057\u307E\u3059\u3002\n\n"+names+"\n\n\u203B\u65E2\u5B58\u306E\u5165\u529B\u306F\u6D88\u3055\u305A\u3001\u672B\u5C3E\u306B\u8FFD\u52A0\u3055\u308C\u307E\u3059\u3002\n\u203B\u53CD\u6620\u5F8C\u306F"+sel+"\u3055\u3093\u306E\u5B9F\u969B\u306E\u72B6\u614B\u306B\u5408\u308F\u305B\u3066\n\u3000\u5FC5\u305A\u7DE8\u96C6\u3057\u3066\u304F\u3060\u3055\u3044\u3002\n\n\u3088\u308D\u3057\u3044\u3067\u3059\u304B\uFF1F"))return;
    setAssessData(prev=>{
      const next={...prev};
      chosen.forEach(it=>{
        it.m.forEach(item=>{
          if(!next[item]) next[item]={cur:"",issue:"",pri:"\u25CB"};
          if((next[item].cur||"").includes("\u3010"+it.n+"\u3011")) return; // 重複防止
          const add="\u3010"+it.n+"\u3011"+it.s+"\n\uFF08\u914D\u616E\uFF09"+it.c;
          next[item]={...next[item],cur:(next[item].cur?next[item].cur+"\n":"")+add};
        });
      });
      return next;
    });
    if(memo&&memo.trim()){
      setAssessData(prev=>{
        const item="\u5065\u5EB7\u30FB\u4F53\u8ABF\u7BA1\u7406";
        const cur=prev[item]||{cur:"",issue:"",pri:"\u25CB"};
        if((cur.cur||"").includes("\u3010\u500B\u5225\u30E1\u30E2\u3011")) return prev;
        return {...prev,[item]:{...cur,cur:(cur.cur?cur.cur+"\n":"")+"\u3010\u500B\u5225\u30E1\u30E2\u3011"+memo.trim()}};
      });
    }
    alert("\u2705 \u30A2\u30BB\u30B9\u30E1\u30F3\u30C8\u30B7\u30FC\u30C8\u3078\u53CD\u6620\u3057\u307E\u3057\u305F\u3002\n\u30A2\u30BB\u30B9\u30E1\u30F3\u30C8\u30BF\u30D6\u3067\u5185\u5BB9\u3092\u78BA\u8A8D\u30FB\u7DE8\u96C6\u3057\u3066\u304F\u3060\u3055\u3044\u3002");
    if(goAssess) goAssess();
  };
  return <div style={{padding:14}}>
    <Header title={"\u1F9E9 \u969C\u5BB3\u7279\u6027 \u2015 "+sel}>
      <GBtn onClick={reflect} disabled={disab.length===0} color="#E65100">🔍 アセスメントへ反映（{disab.length}件）</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{background:"#FFF3E0",border:"1px solid #FFB74D",borderRadius:5,padding:"7px 12px",marginBottom:10,fontSize:11,color:"#E65100",lineHeight:1.7}}>
      ⚠️ ここに記載しているのは手帳制度の障害種別ごとの<b>代表的な症状・特性</b>です。診断・等級判定には使用できません。アセスメントへ反映した後は、必ずご本人の実際の状態に合わせて加筆・修正してください。
    </div>
    <div style={{marginBottom:12}}>
      <div style={{fontSize:11,fontWeight:"bold",color:G,marginBottom:3}}>個別メモ（手帳の種類・等級、診断名、特記事項など）</div>
      <PA v={memo} s={setMemo} rows={2}/>
    </div>
    {DISAB_GROUPS.map(grp=>(
      <div key={grp.g} style={{marginBottom:14}}>
        <div style={{background:grp.color,color:"#fff",padding:"6px 12px",borderRadius:5,fontSize:12,fontWeight:"bold",marginBottom:6}}>{grp.g}</div>
        {grp.items.map(it=>{
          const checked=disab.includes(it.n);
          const opened=!!open[it.n];
          return <div key={it.n} style={{border:"1px solid "+(checked?grp.color:"#ddd"),borderRadius:5,marginBottom:5,overflow:"hidden",background:checked?"#fff":"#fafafa"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",cursor:"pointer"}} onClick={()=>setOpen(o=>({...o,[it.n]:!o[it.n]}))}>
              <input type="checkbox" checked={checked} onClick={e=>e.stopPropagation()} onChange={()=>toggle(it.n)} style={{width:16,height:16,cursor:"pointer",accentColor:grp.color}}/>
              <span style={{fontSize:12,fontWeight:checked?"bold":"normal",color:checked?grp.color:"#444",flex:1}}>{it.n}</span>
              <span style={{fontSize:10,color:"#999"}}>{opened?"\u25B2 \u9589\u3058\u308B":"\u25BC \u75C7\u72B6\u30FB\u914D\u616E\u3092\u898B\u308B"}</span>
            </div>
            {opened&&<div style={{padding:"8px 12px 10px 34px",borderTop:"1px dashed #ddd",fontSize:11,lineHeight:1.8}}>
              <div style={{marginBottom:6}}><span style={{fontWeight:"bold",color:grp.color}}>主な症状・特性：</span>{it.s}</div>
              <div style={{marginBottom:6}}><span style={{fontWeight:"bold",color:"#E65100"}}>支援上の配慮：</span>{it.c}</div>
              <div style={{fontSize:10,color:"#888"}}>反映先：{it.m.join("\uFF0F")}</div>
            </div>}
          </div>;
        })}
      </div>
    ))}
  </div>;
}

// ===== ケース会議 =====

  const [busy,setBusy]=useState(false);

  const caseData={cf:d.cf,ct:d.ct,catt:d.catt,cg1i:d.cg1i,cg1k:d.cg1k,cg2i:d.cg2i,cg2k:d.cg2k,cbikou:d.cbikou};
  const [loadedCase,setLoadedCase]=useState(null);
  const loadCase=(data)=>{if(data.cf!==undefined)s.setCf(data.cf);if(data.ct!==undefined)s.setCt(data.ct);if(data.catt!==undefined)s.setCatt(data.catt);if(data.cg1i!==undefined)s.setCg1i(data.cg1i);if(data.cg1k!==undefined)s.setCg1k(data.cg1k);if(data.cg2i!==undefined)s.setCg2i(data.cg2i);if(data.cg2k!==undefined)s.setCg2k(data.cg2k);if(data.cbikou!==undefined)s.setCbikou(data.cbikou);setLoadedCase(d.sel+"_\u30B1\u30FC\u30B9\u4F1A\u8B70");alert("\u8AAD\u8FBC\u5B8C\u4E86");};
  const inp3={width:"100%",padding:"5px 7px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4,resize:"vertical"};
  return <div style={{padding:14}}>
    <Header title={"\u1F91D \u30B1\u30FC\u30B9\u4F1A\u8B70\u306E\u8981\u70B9 \u2015 "+d.sel}>

      <SaveLoadBtns onSave={()=>saveJSON(d.sel+"_\u30B1\u30FC\u30B9\u4F1A\u8B70",caseData)} onLoad={()=>loadJSON(loadCase)} onOverwrite={()=>saveJSON(loadedCase||d.sel+"_\u30B1\u30FC\u30B9\u4F1A\u8B70",caseData)} hasLoaded={!!loadedCase}/>
      <PrtBtn/>
    </Header>
    <div style={{display:"flex",gap:12,marginBottom:8,fontSize:12,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontWeight:"bold"}}>今期計画期間</span>

          <input value={a.n||""} onChange={e=>{const arr=[...d.catt];arr[i]={...arr[i],n:e.target.value};s.setCatt(arr);}} placeholder="\u6C0F\u540D" style={{padding:"4px 7px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4}}/>

function DocTab({d,s}){

  const gen=async()=>{
    setBusy(true);
    if(dt===0){if(!d.iko){alert("\u5229\u7528\u8005\u30FB\u5BB6\u65CF\u306E\u610F\u5411\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044");setBusy(false);return;}const r1=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u610F\u5411\uFF1A\u300C"+d.iko+"\u300D\u3002\u63F4\u52A9\u65B9\u91DD\u30921\u301C2\u6587\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r1)s.setHoshin(r1.trim());const r2=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u63F4\u52A9\u65B9\u91DD\uFF1A\u300C"+(r1||d.hoshin)+"\u300D\u3002\u9577\u671F\u76EE\u6A19\u30921\u6587\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r2)s.setLong(r2.trim());const r3=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u9577\u671F\u76EE\u6A19\uFF1A\u300C"+(r2||d.long)+"\u300D\u3002\u77ED\u671F\u76EE\u6A19\u30921\u6587\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r3)s.setShort(r3.trim());}
    else if(dt===2){if(!d.g1t){alert("\u500B\u5225\u652F\u63F4\u8A08\u753B\u66F8\u30BF\u30D6\u3067\u652F\u63F4\u76EE\u6A19\u3092\u5165\u529B\u3057\u3066\u304F\u3060\u3055\u3044");setBusy(false);return;}const r1=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u652F\u63F4\u76EE\u6A19\u2460\u300C"+d.g1t+"\u300D\u306E\u9762\u8AC7\u3002\u73FE\u72B6\u30FB\u691C\u8A0E\u4E8B\u9805\u3092\uFF08\u8077\u54E1\uFF09\uFF08\u672C\u4EBA\uFF09\u5F62\u5F0F\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r1)s.setMj1(r1.trim());const r2=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u76EE\u6A19\u2460\u73FE\u72B6\uFF1A\u300C"+r1+"\u300D\u3002\u691C\u8A0E\u5185\u5BB9\u30FB\u5BFE\u5FDC\u30923\u301C4\u6587\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r2)s.setMk1(r2.trim());const r3=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u652F\u63F4\u76EE\u6A19\u2461\u300C"+d.g2t+"\u300D\u306E\u9762\u8AC7\u3002\u73FE\u72B6\u30FB\u691C\u8A0E\u4E8B\u9805\u3092\uFF08\u8077\u54E1\uFF09\uFF08\u672C\u4EBA\uFF09\u5F62\u5F0F\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r3)s.setMj2(r3.trim());const r4=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u76EE\u6A19\u2461\u73FE\u72B6\uFF1A\u300C"+r3+"\u300D\u3002\u691C\u8A0E\u5185\u5BB9\u30FB\u5BFE\u5FDC\u30923\u301C4\u6587\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r4)s.setMk2(r4.trim());const r5=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+d.sel+"\u300D\u3002\u76EE\u6A19\u2460\u2461\u306E\u9762\u8AC7\u7D50\u679C\u3002\u4ECA\u5F8C\u306E\u8AB2\u984C\u30922\u301C3\u6587\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");if(r5)s.setKadai(r5.trim());}
    setBusy(false);
  };
  return <div style={{padding:14}}>

      <div style={{background:G,color:"#fff",padding:"7px 14px",borderRadius:6,fontWeight:"bold",fontSize:13}}>📄 書類作成 ― {d.sel}</div>
      {docs.map((doc,i)=><button key={i} onClick={()=>setDt(i)} style={{padding:"6px 12px",border:"2px solid "+(dt===i?"#388E3C":"#C8E6C9"),borderRadius:5,cursor:"pointer",background:dt===i?"#388E3C":"#fff",color:dt===i?"#fff":"#333",fontSize:12,fontWeight:dt===i?"bold":"normal"}}>{doc}</button>)}
      {(dt===0||dt===2)&&<GBtn onClick={gen} disabled={dt===0?!d.iko:!d.g1t} busy={busy} color="#E65100">🤖 AI一括生成</GBtn>}

// ===== 実績記録（出欠カレンダー） =====
const ATT_CYC=["","\u901A","\u5916","\u6B20","\u52A0","\u5728"];
const ATT_LABEL={"":"\uFF0D","\u901A":"\u901A\u6240","\u5916":"\u65BD\u8A2D\u5916","\u6B20":"\u6B20\u5E2D","\u52A0":"\u6B20\u5E2D\u52A0\u7B97","\u5728":"\u5728\u5B85"};
const ATT_COLOR={"":"#bbb","\u901A":"#388E3C","\u5916":"#1565C0","\u6B20":"#9E9E9E","\u52A0":"#E65100","\u5728":"#7B1FA2"};
function calcMonth(md){
  let use=0,out=0,abs=0,kasan=0,meal=0,s1=0,s2=0;
  Object.values(md||{}).forEach(v=>{
    if(!v)return;
    if(v.st==="\u901A")use++;
    if(v.st==="\u5916"){use++;out++;}
    if(v.st==="\u6B20")abs++;
    if(v.st==="\u52A0")kasan++;
    if(v.meal&&(v.st==="\u901A"||v.st==="\u5916"))meal++;
    if(v.s1&&(v.st==="\u901A"||v.st==="\u5916"))s1++;
    if(v.s2&&(v.st==="\u901A"||v.st==="\u5916"))s2++;
  });
  return {use,out,abs,kasan,meal,s1,s2};
}
function MonthNav({ym,setYm}){
  const mv=(d)=>{const [y,m]=ym.split("-").map(Number);const dt=new Date(y,m-1+d,1);setYm(monthKey(dt));};
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <button onClick={()=>mv(-1)} style={{padding:"4px 10px",border:"1px solid #C8E6C9",background:"#fff",borderRadius:4,cursor:"pointer",fontSize:12}}>◀ 前月</button>
    <span style={{fontWeight:"bold",fontSize:14,color:"#1B5E20",minWidth:110,textAlign:"center"}}>{reiwaYM(ym)}（{ym}）</span>
    <button onClick={()=>mv(1)} style={{padding:"4px 10px",border:"1px solid #C8E6C9",background:"#fff",borderRadius:4,cursor:"pointer",fontSize:12}}>翌月 ▶</button>
  </div>;
}
function AttTab({sel,att,setAtt,jukyu,setJukyu}){
  const [ym,setYm]=useState(monthKey(new Date()));
  const [defIn,setDefIn]=useState("10:00");
  const [defOut,setDefOut]=useState("15:00");
  const [defBrk,setDefBrk]=useState(60); // デフォルト休憩時間(分)
  const [y,m]=ym.split("-").map(Number);
  const nd=daysInMonth(y,m);
  const md=(att&&att[ym])||{};
  const c=calcMonth(md);
  const upDay=(d,patch)=>setAtt(prev=>{
    const p=prev||{};const mm={...(p[ym]||{})};
    mm[d]={...(mm[d]||{}),...patch};
    return {...p,[ym]:mm};
  });
  const fill=()=>{
    setAtt(prev=>{
      const p=prev||{};const mm={...(p[ym]||{})};
      Object.keys(mm).forEach(d=>{
        const v=mm[d];
        if(v&&(v.st==="\u901A"||v.st==="\u5916"))
          mm[d]={...v,in:v.in||defIn,out:v.out||defOut,brk:v.brk!==undefined?v.brk:defBrk};
      });
      return {...p,[ym]:mm};
    });
  };
  const clearMonth=()=>{
    if(!window.confirm(reiwaYM(ym)+"\u306E\u5B9F\u7E3E\u8A18\u9332\u3092\u3059\u3079\u3066\u6D88\u53BB\u3057\u307E\u3059\u304B\uFF1F"))return;
    setAtt(prev=>{const p={...(prev||{})};delete p[ym];return p;});
  };
  // 就業時間計算（1日分・小数点表示）
  const calcDayWork=(v)=>{
    if(!v||(!v.in)||(!v.out))return "";
    const [h1,m1]=(v.in||"0:0").split(":").map(Number);
    const [h2,m2]=(v.out||"0:0").split(":").map(Number);
    const brk=Number(v.brk)||0;
    const diff=(h2*60+m2)-(h1*60+m1)-brk;
    if(diff<=0)return "0.00h";
    return (Math.round(diff/60*100)/100).toFixed(2)+"h";
  };
  const tiny={width:"100%",padding:"2px 3px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3,textAlign:"center"};
  // 月合計就業時間
  const totalWorkMin=Object.values(md).reduce((acc,v)=>{
    if(!v||(v.st!=="\u901A"&&v.st!=="\u5916"&&v.st!=="\u5728"))return acc;
    if(!v.in||!v.out)return acc;
    const [h1,m1]=(v.in||"0:0").split(":").map(Number);
    const [h2,m2]=(v.out||"0:0").split(":").map(Number);
    const brk=Number(v.brk)||0;
    const diff=(h2*60+m2)-(h1*60+m1)-brk;
    return acc+(diff>0?diff:0);
  },0);
  const totalWorkH=Math.floor(totalWorkMin/60);
  const totalWorkM=totalWorkMin%60;

  return <div style={{padding:14}}>
    <Header title={"\u1F4C5 \u30B5\u30FC\u30D3\u30B9\u63D0\u4F9B\u5B9F\u7E3E\u8A18\u9332 \u2015 "+sel}>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
      <MonthNav ym={ym} setYm={setYm}/>
      <span style={{fontSize:11,fontWeight:"bold",color:"#1B5E20"}}>受給者証番号</span>
      <input value={jukyu||""} onChange={e=>setJukyu(e.target.value)} placeholder="10\u6841"
        style={{padding:"4px 7px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4,width:110}}/>
      <span style={{fontSize:10,color:"#888"}}>基本時間</span>
      <input value={defIn} onChange={e=>setDefIn(e.target.value)}
        style={{width:50,padding:"2px 3px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3,textAlign:"center"}}/>〜
      <input value={defOut} onChange={e=>setDefOut(e.target.value)}
        style={{width:50,padding:"2px 3px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3,textAlign:"center"}}/>
      <span style={{fontSize:10,color:"#888"}}>休憩(分)</span>
      <input type="number" value={defBrk} onChange={e=>setDefBrk(Number(e.target.value)||0)}
        style={{width:45,padding:"2px 3px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3,textAlign:"center"}}/>
      <button onClick={fill}
        style={{padding:"4px 9px",fontSize:10,background:"#388E3C",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontWeight:"bold"}}>
        ⏰ 出席日に一括入力
      </button>
      <button onClick={clearMonth}
        style={{padding:"4px 9px",fontSize:10,background:"#FFEBEE",color:"#C62828",border:"1px solid #EF9A9A",borderRadius:4,cursor:"pointer"}}>
        🗑 月クリア
      </button>
    </div>
    <div className="np" style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"5px 10px",marginBottom:8,fontSize:10,color:"#33691E",lineHeight:1.7}}>
      「提供状況」を押すたびに <b>－ → 通所 → 施設外 → 欠席 → 欠席加算</b> と切替。就業時間＝終了－開始－休憩。
    </div>
    <div className="print-only" style={{marginBottom:6}}>
      <div style={{textAlign:"center",fontSize:16,fontWeight:"bold"}}>（{OFFICE.svc}）サービス提供実績記録票</div>

        <span>受給者証番号：{jukyu||"\u3000\u3000\u3000\u3000\u3000\u3000"}</span>
        <span>支給決定障害者氏名：{sel}</span>

        <th style={{...th,width:"5%"}}>送迎往</th>
        <th style={{...th,width:"5%"}}>送迎復</th>

        <th style={{...th,width:"7%"}}>本人確認</th>
        <th style={th}>支援内容</th>
      </tr></thead>
      <tbody>
        {Array.from({length:nd},(_,i)=>i+1).map(d=>{
          const dd=md[d]||{};
          const wd=new Date(y,m-1,d).getDay();
          const bg=wd===0?"#FFF5F5":wd===6?"#F0F7FF":"#fff";
          const lbl=ATT_LABEL[dd.st||""];

          return <tr key={d} style={{background:bg}}>

              <button onClick={()=>{const i=ATT_CYC.indexOf(dd.st||"");upDay(d,{st:ATT_CYC[(i+1)%ATT_CYC.length]});}}

                  background:ATT_COLOR[dd.st||""],color:"#fff"}}>{lbl}</button>
              <span className="print-only-inline" style={{fontSize:11}}>{lbl==="\uFF0D"?"":lbl}</span>
            </td>
            <td style={{...td,padding:"2px"}}>
              <input value={dd.in||""} onChange={e=>upDay(d,{in:e.target.value})} style={tiny}/>

            <td style={{...td,padding:"2px"}}>
              <input value={dd.out||""} onChange={e=>upDay(d,{out:e.target.value})} style={tiny}/>

// ---- 共通ヘルパー ----
function fmtYM(ym){
  const [y,m]=ym.split("-").map(Number);
  return "\u4EE4\u548C"+(y-2018)+"\u5E74"+m+"\u6708";
}
function fmtYMslash(ym){
  const [y,m]=ym.split("-").map(Number);
  return y+"\u5E74"+m+"\u6708";
}
function daysInMonthH(ym){
  const [y,m]=ym.split("-").map(Number);
  return new Date(y,m,0).getDate();
}
function getAttDays(attData,ym){
  const md=(attData||{})[ym]||{};
  let use=0,out=0,kasan=0;
  Object.values(md).forEach(v=>{
    if(!v)return;
    if(v.st==="\u901A")use++;
    if(v.st==="\u5916"){use++;out++;}
    if(v.st==="\u52A0")kasan++;
  });
  return {use,out,kasan};
}
// 就業時間（開始〜終了の分数を合計→時間）
function calcWorkHours(attData,ym){
  const md=(attData||{})[ym]||{};
  let totalMin=0;
  Object.values(md).forEach(v=>{
    if(!v||(v.st!=="\u901A"&&v.st!=="\u5916"&&v.st!=="\u5728"))return;
    if(v.in&&v.out){
      const [h1,m1]=(v.in||"0:0").split(":").map(Number);
      const [h2,m2]=(v.out||"0:0").split(":").map(Number);
      const brk=Number(v.brk)||0; // 休憩時間(分)
      const diff=(h2*60+m2)-(h1*60+m1)-brk;
      if(diff>0) totalMin+=diff;
    }
  });
  return Math.round(totalMin/60*100)/100; // 小数点2桁
}
// 時給計算（就業時間×時給）
function calcWageByHour(attData,ym,hourlyRate){
  const hours=calcWorkHours(attData,ym);
  return Math.floor(hours*hourlyRate);
}
// localStorage から工賃設定を取得（利用者別）
function getWageSettings(allData,name){
  const u=allData[name]||{};
  return u.wageSettings||{hourlyRate:410,specialBonus:0,nougchiBonus:0,lunchFee:300,advance:0};
}

// 10. 工賃計算タブ（全員集計・時間制）
// ============================================================
function WageTab({names,allData,setAllData,office}){
  const [ym,setYm]=useState(monthKey(new Date()));
  const [busy,setBusy]=useState(false);
  const [aiComment,setAiComment]=useState("");
  const [defHourly,setDefHourly]=useState(410);

  // 土曜就業時間(分)計算
  const calcSatWorkMin=(attData,ym2)=>{
    const [y2,m2]=ym2.split("-").map(Number);
    const md=(attData||{})[ym2]||{};
    let totalMin=0;
    Object.entries(md).forEach(([d,v])=>{
      if(!v||(v.st!=="\u901A"&&v.st!=="\u5916"))return;
      const wd=new Date(y2,m2-1,Number(d)).getDay();
      if(wd!==6)return; // 土曜のみ
      if(v.in&&v.out){
        const [h1,m1]=(v.in||"0:0").split(":").map(Number);
        const [h2,m2b]=(v.out||"0:0").split(":").map(Number);
        const brk=Number(v.brk)||0;
        const diff=(h2*60+m2b)-(h1*60+m1)-brk;
        if(diff>0) totalMin+=diff;
      }
    });
    return totalMin;
  };

  // 食事提供回数を実績記録から取得
  const getMealCount=(attData,ym2)=>{
    const md=(attData||{})[ym2]||{};
    let cnt=0;
    Object.values(md).forEach(v=>{
      if(v&&v.meal&&(v.st==="\u901A"||v.st==="\u5916"))cnt++;
    });
    return cnt;

  const rows=names.map(n=>{
    const u=allData[n]||{};
    const ws=getWageSettings(allData,n);
    const {use,out}=getAttDays(u.att||{},ym);
    const hours=calcWorkHours(u.att||{},ym);
    const hourlyRate=Number(ws.hourlyRate)||defHourly;
    const baseWage=calcWageByHour(u.att||{},ym,hourlyRate);
    // 特別加算＝土曜就業時間×時給×0.5
    const satMin=calcSatWorkMin(u.att||{},ym);
    const satHours=satMin/60;
    const specialBonus=ws.specialBonusManual!==undefined
      ?Number(ws.specialBonusManual)
      :Math.floor(satHours*hourlyRate*0.5);
    const nougchiBonus=Number(ws.nougchiBonus)||0;
    const lunchFee=Number(ws.lunchFee)||0;
    // 給食代計＝食事提供回数×単価（編集可能override付き）
    const mealCnt=getMealCount(u.att||{},ym);
    const lunchCalc=mealCnt*lunchFee;
    const lunchTotal=ws.lunchTotalManual!==undefined?Number(ws.lunchTotalManual):lunchCalc;
    const advance=Number(ws.advance)||0;
    const gross=baseWage+specialBonus+nougchiBonus;
    const net=gross-lunchTotal-advance;
    return {n,jukyu:u.jukyu||"",use,out,hours,hourlyRate,baseWage,
      satMin,specialBonus,nougchiBonus,
      lunchFee,mealCnt,lunchCalc,lunchTotal,

  const dlCsv=()=>{

    const lines=[head.map(esc).join(",")]
      .concat(rows.map(r=>[r.n,r.jukyu,r.use,r.hours,r.hourlyRate,r.baseWage,r.specialBonus,r.nougchiBonus,r.mealCnt,r.lunchTotal,r.advance,r.net].map(esc).join(",")))
      .concat([["\u5408\u8A08","",total.use,total.hours,"",total.baseWage,total.specialBonus,"","",total.lunchTotal,total.advance,total.net].map(esc).join(",")]);
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);

    URL.revokeObjectURL(url);

  const genAI=async()=>{

    const summary=rows.map(r=>`${r.n}:${r.use}日/${r.hours}h/支給${r.net}円`).join("\u3001");
    const txt=await ai(`就労継続支援B型「${office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}」${fmtYM(ym)}工賃集計。${summary}。合計支給額:${total.net}円。管理者向けに今月の工賃状況を60文字以内でコメントしてください。`);
    setAiComment(txt||"");setBusy(false);

      <GBtn onClick={()=>{try{localStorage.setItem(officeKey("wage_saved_"+ym),JSON.stringify(rows));alert("\u2705 "+fmtYM(ym)+"\u306E\u5DE5\u8CC3\u8A08\u7B97\u3092\u4FDD\u5B58\u3057\u307E\u3057\u305F");}catch(e){alert("\u4FDD\u5B58\u30A8\u30E9\u30FC: "+e.message);}}} disabled={rows.length===0} color="#E65100">💾 工賃保存</GBtn>
      <GBtn onClick={genAI} busy={busy} disabled={rows.length===0}>🤖 AIコメント</GBtn>
      <PrtBtn/>

    <div className="np" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>

    {aiComment&&<div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"7px 12px",marginBottom:8,fontSize:12,color:"#1B5E20"}}>💬 {aiComment}</div>}

function WageDetailTab({sel,names,allData,office}){
  const [ym,setYm]=useState(monthKey(new Date()));

  const [aiMsgs,setAiMsgs]=useState({});
  const [printAll,setPrintAll]=useState(false);
  const [issueDate,setIssueDate]=useState(reiwaToday());

  const WD2=["\u65E5","\u6708","\u706B","\u6C34","\u6728","\u91D1","\u571F"];
  const ATT2={"\u901A":"\u901A\u6240","\u5916":"\u65BD\u8A2D\u5916","\u6B20":"\u6B20\u5E2D","\u52A0":"\u6B20\u5E2D\u52A0\u7B97","":"\uFF0D"};

  const getMealCount=(attData,ym2)=>{
    const md=(attData||{})[ym2]||{};
    let cnt=0;
    Object.values(md).forEach(v=>{if(v&&v.meal&&(v.st==="\u901A"||v.st==="\u5916"))cnt++;});
    return cnt;
  };

  const buildDetail=(name)=>{
    const u=allData[name]||{};
    const ws=getWageSettings(allData,name);
    const md=(u.att||{})[ym]||{};
    const [y2,m2]=ym.split("-").map(Number);

      const v=md[d]||{};
      const dt=new Date(y2,m2-1,d);
      const isActive=v.st==="\u901A"||v.st==="\u5916";

      if(isActive&&v.in&&v.out){
        const [h1,m1]=(v.in||"0:0").split(":").map(Number);
        const [h2,m2b]=(v.out||"0:0").split(":").map(Number);
        const brk=Number(v.brk)||0;
        const diff=(h2*60+m2b)-(h1*60+m1)-brk;
        if(diff>0){const hh=Math.floor(diff/60);const mm=diff%60;workTime=hh+":"+(mm<10?"0":"")+mm;}
      }
      days.push({d,wd:WD2[dt.getDay()],st:v.st||"",in:v.in||"",out:v.out||"",brk:v.brk,
        meal:v.meal,s1:v.s1,s2:v.s2,memo:v.memo||"",staff:v.staff||"",confirm:v.confirm||"",workTime});
    }
    const use=days.filter(d=>d.st==="\u901A"||d.st==="\u5916").length;
    const hours=calcWorkHours(u.att||{},ym);
    const hourlyRate=Number(ws.hourlyRate)||410;
    const baseWage=calcWageByHour(u.att||{},ym,hourlyRate);
    // 土曜特別加算
    const [y2b,m2b]=ym.split("-").map(Number);
    let satMin=0;
    Object.entries(md).forEach(([d,v])=>{
      if(!v||(v.st!=="\u901A"&&v.st!=="\u5916"))return;
      if(new Date(y2b,m2b-1,Number(d)).getDay()!==6)return;
      if(v.in&&v.out){
        const [h1,m1]=(v.in||"0:0").split(":").map(Number);
        const [h2,m2c]=(v.out||"0:0").split(":").map(Number);
        const brk=Number(v.brk)||0;
        const diff=(h2*60+m2c)-(h1*60+m1)-brk;
        if(diff>0) satMin+=diff;
      }
    });
    const specialBonus=ws.specialBonusManual!==undefined?Number(ws.specialBonusManual):Math.floor(satMin/60*hourlyRate*0.5);
    const nougchiBonus=Number(ws.nougchiBonus)||0;
    const lunchFee=Number(ws.lunchFee)||0;
    const mealCnt=getMealCount(u.att||{},ym);
    const lunchCalc=mealCnt*lunchFee;
    const lunchTotal=ws.lunchTotalManual!==undefined?Number(ws.lunchTotalManual):lunchCalc;
    const advance=Number(ws.advance)||0;
    const net=baseWage+specialBonus+nougchiBonus-lunchTotal-advance;
    return {name,jukyu:u.jukyu||"",days,use,hours,hourlyRate,baseWage,
      specialBonus,nougchiBonus,lunchFee,mealCnt,lunchTotal,advance,net};
  };

  const targets=printAll
    ?names.filter(n=>{const u=allData[n]||{};return getAttDays(u.att||{},ym).use>0;})
    :(sel?[sel]:[]);

  const genMsg=async(name)=>{
    setBusy(true);
    const det=buildDetail(name);
    const txt=await ai(`就労継続支援B型「${office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}」${fmtYM(ym)}工賃明細書の一言メッセージを40文字以内で。利用者:${name}、利用日数:${det.use}日、就業時間:${det.hours}時間、支給額:${det.net}円。本人への温かい言葉で。`);
    setAiMsgs(prev=>({...prev,[name]:txt||""}));setBusy(false);
  };

  const dlCsv=()=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    let lines=[["\u6C0F\u540D","\u5BFE\u8C61\u6708","\u5229\u7528\u65E5\u6570","\u5C31\u696D\u6642\u9593","\u6642\u7D66","\u5DE5\u8CC3","\u7279\u5225\u52A0\u7B97","\u5185\u8FB2\u5730\u52A0\u7B97","\u7D66\u98DF\u4EE3","\u524D\u501F","\u652F\u7D66\u984D"].map(esc).join(",")];
    targets.forEach(name=>{
      const d=buildDetail(name);
      lines.push([d.name,fmtYMslash(ym),d.use,d.hours,d.hourlyRate,d.baseWage,d.specialBonus,d.nougchiBonus,d.lunchTotal,d.advance,d.net].map(esc).join(","));
    });
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u5DE5\u8CC3\u660E\u7D30_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };

  // 1枚に2人分レイアウト（A4紙いっぱい）
  const renderCard=(det,idx2)=>{
    const thS={border:"1px solid #333",padding:"5px 8px",background:"#f5f5f5",fontWeight:"bold",fontSize:12,textAlign:"center"};
    const tdS={border:"1px solid #333",padding:"5px 8px",fontSize:12,textAlign:"center"};
    const defMsg="\u304D\u3093\u3053\u3093\u304B\u3093\u306E\u3054\u5229\u7528\u3042\u308A\u304C\u3068\u3046\u3054\u3056\u3044\u307E\u3059\u3002\n\u6765\u6708\u3082\u307E\u305F\u4F53\u306B\u6C17\u3092\u3064\u3051\u3066\u3001\u7686\u69D8\u4EF2\u826F\u304F\u697D\u3057\u304F\u904E\u3054\u3057\u3066\u307E\u3044\u308A\u307E\u3057\u3087\u3046\u3002";
    // 支払方法は工賃計算から参照
    const u=allData[det.name]||{};
    const ws=getWageSettings(allData,det.name);
    const payM=(ws&&ws.payMethod)||"\u5DE5\u8CC3\u6255\u3044";
    // 金種計算
    const calcKindane=(amount)=>{
      const result=[];
      const coins=[10000,5000,1000,500,100,50,10,5,1];
      const labels=["1\u4E07","5\u5343","\u5343","500","100","50","10","5","1"];
      let rem=amount;
      coins.forEach((c,i)=>{const cnt=Math.floor(rem/c);if(cnt>0){result.push({lbl:labels[i],cnt});}rem%=c;});
      return result;
    };
    const kindane=calcKindane(det.net>0?det.net:0);
    return <div key={det.name} style={{
      flex:"0 0 calc(50% - 8px)",minWidth:0,border:"2px solid #333",padding:"14px 16px",background:"#fff",
      pageBreakInside:"avoid",boxSizing:"border-box",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>
      <div style={{textAlign:"center",fontSize:18,fontWeight:"bold",letterSpacing:6,marginBottom:10,
        borderBottom:"2px solid #333",paddingBottom:6}}>工　賃　明　細　書</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{fontSize:14,borderBottom:"1px solid #333",minWidth:180,paddingBottom:2,fontWeight:"bold"}}>{det.name}　様</div>
        <div style={{fontSize:12,color:"#555"}}>{fmtYMslash(ym)}分</div>
      </div>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:6}}>
        <thead><tr>
          <th style={thS}>利用日数</th>
          <th style={thS}>就業時間</th>
          <th style={thS}>時給（円）</th>
          <th style={thS}>工賃（円）</th>
        </tr></thead>
        <tbody><tr>
          <td style={tdS}>{det.use}日</td>
          <td style={tdS}>{det.hours}h</td>
          <td style={tdS}>{det.hourlyRate.toLocaleString()}</td>
          <td style={tdS}>{det.baseWage.toLocaleString()}</td>
        </tr></tbody>
      </table>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:6}}>
        <thead><tr>
          <th style={thS}>特別加算</th>
          <th style={thS}>内農地加算</th>
          <th style={{...thS,background:"#1B5E20",color:"#fff"}}>支払方法</th>
          <th style={{...thS,background:"#1B5E20",color:"#fff"}}>支給額（円）</th>
        </tr></thead>
        <tbody><tr>
          <td style={tdS}>{det.specialBonus>0?det.specialBonus.toLocaleString():"-"}</td>
          <td style={tdS}>{det.nougchiBonus>0?det.nougchiBonus.toLocaleString():"-"}</td>
          <td style={{...tdS,fontWeight:"bold"}}>{payM}</td>
          <td style={{...tdS,fontWeight:"bold",fontSize:14,background:"#F1F8E9"}}>¥{det.net.toLocaleString()}</td>
        </tr></tbody>
      </table>
      {/* 金種 */}
      {det.net>0&&<div style={{marginBottom:8,padding:"5px 8px",background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:4}}>
        <span style={{fontSize:11,fontWeight:"bold",color:"#5D4037",marginRight:8}}>💴 金種：</span>
        {kindane.map((k,i)=><span key={i} style={{fontSize:11,marginRight:10}}>{k.lbl}円×<b>{k.cnt}</b>枚</span>)}
      </div>}
      <div style={{fontSize:11,marginBottom:8,lineHeight:1.8,whiteSpace:"pre-line",flex:1}}>
        {aiMsgs[det.name]||defMsg}
      </div>
      <div style={{textAlign:"right",fontSize:11,lineHeight:2,borderTop:"1px solid #ddd",paddingTop:6}}>
        {issueDate}<br/>
        {office.houjin?<span>{office.houjin}<br/></span>:null}
        {office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}<br/>
        {office.kanriName?<span>管理者　<b>{office.kanriName}</b><br/></span>:null}
        <span style={{fontWeight:"bold"}}>サービス管理責任者　{office.kanri||"\u3000\u3000\u3000\u3000"}</span>
      </div>
    </div>;
  };

  // 2人1組にグループ化
  const pairs=[];
  for(let i=0;i<targets.length;i+=2){
    pairs.push(targets.slice(i,i+2).map(n=>buildDetail(n)));
  }

  return <div style={{padding:14}}>
    <Header title={"\u1F4C3 \u5DE5\u8CC3\u660E\u7D30\u66F8 \u2015 "+fmtYM(ym)}>
      <GBtn onClick={dlCsv} disabled={targets.length===0} color="#1B5E20">📥 CSV出力</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
      <MonthNav ym={ym} setYm={setYm}/>
      <span style={{fontSize:11,color:"#1B5E20",fontWeight:"bold"}}>発行日</span>
      <input value={issueDate} onChange={e=>setIssueDate(e.target.value)}
        style={{padding:"4px 7px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4,width:130}}/>
      <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
        <input type="checkbox" checked={printAll} onChange={e=>setPrintAll(e.target.checked)}
          style={{accentColor:"#388E3C"}}/>
        全員分まとめて表示・印刷（1枚に2人）
      </label>
      {targets.length>0&&<GBtn onClick={()=>targets.forEach(n=>genMsg(n))} busy={busy}>🤖 全員AIメッセージ一括生成</GBtn>}
    </div>
    {!sel&&!printAll&&<div style={{textAlign:"center",padding:30,color:"#999"}}>利用者を選択するか「全員まとめて表示・印刷」にチェックしてください</div>}
    {pairs.map((pair,pi)=>(
      <div key={pi} style={{display:"flex",gap:16,marginBottom:0,pageBreakAfter:"always",minHeight:"49vh"}}>
        {pair.map((det,i)=>renderCard(det,pi*2+i))}
        {pair.length===1&&<div style={{flex:"0 0 calc(50% - 8px)",minWidth:0}}/>}
      </div>
    ))}
  </div>;
}

function InvoiceTab({names,allData,office}){
  const [ym,setYm]=useState(monthKey(new Date()));

  const [selUser,setSelUser]=useState("");
  const [payMethod,setPayMethod]=useState("\u5DE5\u8CC3\u6255\u3044");

  const getMealCount=(attData,ym2)=>{
    const md=(attData||{})[ym2]||{};
    let cnt=0;
    Object.values(md).forEach(v=>{if(v&&v.meal&&(v.st==="\u901A"||v.st==="\u5916"))cnt++;});
    return cnt;
  };

  const buildInvoice=(name)=>{
    const u=allData[name]||{};
    const ws=getWageSettings(allData,name);
    const {use}=getAttDays(u.att||{},ym);
    const lunchFee=Number(ws.lunchFee)||0;
    const mealCnt=getMealCount(u.att||{},ym);
    const lunchCalc=mealCnt*lunchFee;
    const lunchTotal=ws.lunchTotalManual!==undefined?Number(ws.lunchTotalManual):lunchCalc;
    return {name,jukyu:u.jukyu||"",use,lunchFee,mealCnt,lunchTotal};

  const allRows=names.map(n=>buildInvoice(n)).filter(r=>r.use>0);

  const dlCsv=()=>{

    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u663C\u98DF\u4EE3\u8ACB\u6C42_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };

  const renderCard=(name)=>{
    const inv=buildInvoice(name);
    const thS={border:"1px solid #333",padding:"7px 10px",fontWeight:"bold",fontSize:12,textAlign:"center",background:"#f5f5f5"};
    const tdS={border:"1px solid #333",padding:"7px 10px",fontSize:12};
    const tdR={...tdS,textAlign:"right",fontWeight:"bold"};
    // 支払方法は工賃計算から参照

    return <div key={name} style={{
      flex:"0 0 calc(50% - 8px)",minWidth:0,border:"2px solid #333",padding:"16px 18px",background:"#fff",

        borderBottom:"2px solid #333",paddingBottom:6}}>請　求　書　及　び　領　収　証</div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>

        <div style={{fontSize:12,color:"#555"}}>{issueDate}</div>
      </div>
      <div style={{fontSize:12,marginBottom:10}}>下記の通りご請求申し上げます。</div>
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:14}}>
        <tbody>
          <tr>
            <th style={{...thS,width:"50%"}}>昼食代（税込）</th>
            <td style={{...tdR,fontSize:16}}>¥{inv.lunchTotal.toLocaleString()}</td>
          </tr>
          <tr>
            <th style={thS}>対象年月</th>
            <td style={tdS}>{fmtYMslash(ym)}</td>
          </tr>
          <tr>
            <th style={thS}>支払方法</th>
            <td style={{...tdS,fontWeight:"bold",color:"#1B5E20"}}>{payM}</td>
          </tr>
        </tbody>
      </table>
      <div style={{borderTop:"2px solid #333",paddingTop:8,marginBottom:10,fontSize:12,fontWeight:"bold"}}>上記、正に領収いたしました。</div>

        {issueDate}<br/>
        {office.houjin?<span>{office.houjin}<br/></span>:null}
        {office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}<br/>
        {office.kanriName?<span>管理者　<b>{office.kanriName}</b><br/></span>:null}

      <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>

// 13. 給付費通知タブ（様式④準拠・全員表示・1枚2人印刷・個別年月・個別市町村）
// ============================================================
function KyufuTab({names,allData,office}){

  const [aiSummary,setAiSummary]=useState("");

  const [kyufuAmounts,setKyufuAmounts]=useState({});
  const [tantoAmounts,setTantoAmounts]=useState({});

  const [userCity,setUserCity]=useState({}); // {name: "\u5E02\u753A\u6751\u540D"}

  const rows=names.map(n=>{
    const u=allData[n]||{};
    const ws=getWageSettings(allData,n);
    const {use,out,kasan}=getAttDays(u.att||{},ym);
    const hours=calcWorkHours(u.att||{},ym);
    const hourlyRate=Number(ws.hourlyRate)||410;
    const baseWage=calcWageByHour(u.att||{},ym,hourlyRate);
    const specialBonus=ws.specialBonusManual!==undefined?Number(ws.specialBonusManual):0;
    const nougchiBonus=Number(ws.nougchiBonus)||0;
    const lunchTotal=ws.lunchTotalManual!==undefined?Number(ws.lunchTotalManual):0;
    const advance=Number(ws.advance)||0;
    const net=baseWage+specialBonus+nougchiBonus-lunchTotal-advance;
    const kyufu=Number(kyufuAmounts[n])||0;
    const tanto=Number(tantoAmounts[n])||0;
    const thisYM=userYM[n]||ym;
    const [y2,mo2]=thisYM.split("-").map(Number);
    const thisCity=userCity[n]||defaultCity;
    return {n,jukyu:u.jukyu||"",use,out,kasan,hours,net,kyufu,tanto,thisYM,thisCity,
      svcYMdisp:y2+"\u5E74"+mo2+"\u6708"};
  });

  const used=rows.filter(r=>r.use>0||r.kasan>0||printAll);
  const targets=printAll?rows:rows.filter(r=>r.use>0||r.kasan>0);

  const upKyufu=(name,val)=>setKyufuAmounts(prev=>({...prev,[name]:val}));
  const upTanto=(name,val)=>setTantoAmounts(prev=>({...prev,[name]:val}));
  const upUserYM=(name,val)=>setUserYM(prev=>({...prev,[name]:val}));
  const upUserCity=(name,val)=>setUserCity(prev=>({...prev,[name]:val}));

  // 様式④ 1人分カード
  const renderKyufuCard=(r,idx)=>{
    const thK={border:"1px solid #333",padding:"5px 8px",fontWeight:"bold",fontSize:11,background:"#f5f5f5",textAlign:"center",verticalAlign:"middle"};
    const tdK={border:"1px solid #333",padding:"5px 8px",fontSize:11,verticalAlign:"middle"};
    return <div key={r.n} style={{
      flex:"0 0 calc(50% - 8px)",minWidth:0,border:"2px solid #333",padding:"14px 16px",background:"#fff",
      boxSizing:"border-box",pageBreakInside:"avoid",display:"flex",flexDirection:"column"}}>
      {/* タイトル */}
      <div style={{textAlign:"center",fontSize:15,fontWeight:"bold",letterSpacing:3,marginBottom:8,
        borderBottom:"2px solid #333",paddingBottom:5}}>
        訓練等給付費のお知らせ
      </div>
      {/* 宛先 */}
      <div style={{fontSize:13,fontWeight:"bold",borderBottom:"1px solid #333",marginBottom:8,paddingBottom:4}}>
        {r.n}　様
      </div>
      {/* 本文 */}
      <div style={{fontSize:11,marginBottom:6,lineHeight:1.7}}>
        あなたに提供したサービスに適用した、市町村からの支払いについて、お知らせいたします。<br/>
        また以上を承知しましたので、お知らせしたものとして扱い下さい。
      </div>
      {/* 上段テーブル（サービス費） */}
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:4}}>
        <thead><tr>
          <th style={{...thK,width:"20%"}}>日<br/>付</th>
          <th style={{...thK,width:"30%"}}>サービスに<br/>かかった費用</th>
          <th style={{...thK,width:"25%"}}>サービス費<br/>計算結果（A）</th>
          <th style={{...thK,width:"25%"}}>利用者負担<br/>（B）</th>
        </tr></thead>
        <tbody>
          <tr>
            <td style={{...tdK,textAlign:"center"}}>{r.svcYMdisp}</td>
            <td style={{...tdK,textAlign:"center"}}>{r.thisCity}</td>
            <td style={{...tdK,textAlign:"right",fontWeight:"bold"}}>¥{r.kyufu.toLocaleString()}</td>
            <td style={{...tdK,textAlign:"right",color:"#C62828",fontWeight:"bold"}}>¥{r.tanto.toLocaleString()}</td>
          </tr>
        </tbody>
      </table>
      {/* サービス内容ラベル */}
      <div style={{fontSize:10,color:"#555",marginBottom:4,padding:"3px 6px",background:"#f9f9f9",border:"1px solid #eee"}}>
        ※ サービス種類：就労継続支援B型<br/>
        ※ 上記に記載した（A）から（B）を差し引いた額が、あなたのために「{office.name||""}」が{r.thisCity}に請求します。
      </div>
      {/* 受領日・事業所 */}
      <div style={{textAlign:"right",fontSize:11,lineHeight:1.9,marginTop:"auto",borderTop:"1px solid #ddd",paddingTop:6}}>
        {receiptDate}<br/>
        {office.svc||"\u5C31\u52B4\u7D99\u7D9A\u652F\u63F4B\u578B"}　{office.name||""}<br/>
        事業所番号：{office.officeNo||"\u3000\u3000\u3000\u3000\u3000"}<br/>
        {office.kanriName?<span>管理者　<b>{office.kanriName}</b><br/></span>:null}
        <span style={{fontWeight:"bold"}}>サービス管理責任者　{office.kanri||"\u3000\u3000\u3000\u3000"}</span>
      </div>
    </div>;
  };

  // 2人1組
  const pairs=[];
  for(let i=0;i<targets.length;i+=2){
    pairs.push(targets.slice(i,i+2));
  }

  const dlCsv=()=>{
    const esc=v=>'"'+String(v).replace(/"/g,'""')+'"';
    const lines=[["\u756A\u53F7","\u6C0F\u540D","\u53D7\u7D66\u8005\u8A3C\u756A\u53F7","\u30B5\u30FC\u30D3\u30B9\u63D0\u4F9B\u5E74\u6708","\u5E02\u753A\u6751\u540D","\u5C31\u52B4\u7D99\u7D9A\u652F\u63F4B\u578B\u7D66\u4ED8\u8CBB","\u53D7\u9818\u65E5","\u5229\u7528\u8005\u8CA0\u62C5\u984D"].map(esc).join(",")]
      .concat(targets.map((r,i)=>[i+1,r.n,r.jukyu,r.svcYMdisp,r.thisCity,r.kyufu,receiptDate,r.tanto].map(esc).join(",")));
    const blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="\u7D66\u4ED8\u8CBB\u901A\u77E5_"+ym+".csv";a.click();
    URL.revokeObjectURL(url);
  };

  const genAI=async()=>{
    setBusy(true);setAiSummary("");
    const total=targets.reduce((a,r)=>a+r.kyufu,0);
    const txt=await ai(`就労継続支援B型「${office.name||"\u304D\u3093\u3053\u3093\u304B\u3093"}」${fmtYM(ym)}訓練等給付費通知。利用者${targets.length}名、給付費総額${total}円。管理職向け月次コメントを80文字以内で。`);
    setAiSummary(txt||"");setBusy(false);
  };

  const inp2={padding:"2px 4px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:3,textAlign:"right"};

  return <div style={{padding:14}}>
    <Header title={"\u1F4E8 \u8A13\u7DF4\u7B49\u7D66\u4ED8\u8CBB\u306E\u304A\u77E5\u3089\u305B \u2015 "+fmtYM(ym)}>
      <GBtn onClick={dlCsv} disabled={targets.length===0} color="#1B5E20">📥 CSV出力</GBtn>
      <GBtn onClick={genAI} busy={busy} disabled={targets.length===0}>🤖 AIコメント</GBtn>
      <PrtBtn/>
    </Header>
    <div className="np" style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
      <MonthNav ym={ym} setYm={setYm}/>
      <span style={{fontSize:11,color:"#1B5E20",fontWeight:"bold"}}>受領日</span>
      <input value={receiptDate} onChange={e=>setReceiptDate(e.target.value)}
        style={{padding:"4px 7px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4,width:130}}/>
      <span style={{fontSize:11,color:"#1B5E20",fontWeight:"bold"}}>デフォルト市町村</span>
      <input value={defaultCity} onChange={e=>setDefaultCity(e.target.value)}
        style={{padding:"4px 7px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4,width:90}}/>
      <label style={{fontSize:11,display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
        <input type="checkbox" checked={printAll} onChange={e=>setPrintAll(e.target.checked)} style={{accentColor:"#388E3C"}}/>
        ☐ 全員まとめて表示・印刷
      </label>
    </div>
    {aiSummary&&<div style={{background:"#E8F5E9",border:"1px solid #A5D6A7",borderRadius:5,padding:"7px 12px",marginBottom:8,fontSize:12,color:"#1B5E20"}}>💬 {aiSummary}</div>}

    <div style={{background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:5,padding:"6px 12px",marginBottom:10,fontSize:11,color:"#555"}}>
      💡 給付費・負担額は受給者証から手入力。サービス提供年月・市町村は一人ずつ個別設定可能です。
    </div>

    {/* 入力テーブル */}
    <div style={{overflowX:"auto",marginBottom:16}}>
    <table style={{width:"100%",borderCollapse:"collapse",minWidth:850}} className="screen-only">
      <thead>
        <tr>
          <th style={th}>氏名</th>
          <th style={{...th,width:"12%"}}>受給者証番号</th>
          <th style={{...th,width:"13%"}}>サービス提供年月<br/><span style={{fontSize:9,fontWeight:"normal"}}>(個別設定)</span></th>
          <th style={{...th,width:"12%"}}>市町村名<br/><span style={{fontSize:9,fontWeight:"normal"}}>(個別設定)</span></th>
          <th style={{...th,width:"14%",background:"#1B5E20",color:"#fff"}}>給付費（入力）</th>
          <th style={{...th,width:"11%"}}>受領日</th>
          <th style={{...th,width:"10%"}}>利用者負担額</th>
        </tr>
      </thead>
      <tbody>
        {rows.length===0&&<tr><td colSpan={7} style={{...td,textAlign:"center",color:"#999",padding:14}}>この月の実績がありません</td></tr>}
        {rows.map((r,i)=><tr key={r.n} style={{background:i%2===0?"#fff":"#F9FBE7"}}>
          <td style={{...td,fontWeight:"bold"}}>{r.n}</td>
          <td style={{...td,textAlign:"center",fontSize:10,color:r.jukyu?"#333":"#C62828"}}>
            {r.jukyu||"\u672A\u5165\u529B"}
          </td>
          <td style={{...td,padding:"2px"}}>
            <input type="month" value={userYM[r.n]||ym}
              onChange={e=>upUserYM(r.n,e.target.value||ym)}
              style={{width:"100%",padding:"3px 4px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:3}}/>
          </td>
          <td style={{...td,padding:"2px"}}>
            <input value={userCity[r.n]||defaultCity}
              onChange={e=>upUserCity(r.n,e.target.value)}
              style={{width:"100%",padding:"3px 4px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:3}}/>
          </td>
          <td style={{...td,padding:"2px",textAlign:"right"}}>
            <input type="number" value={kyufuAmounts[r.n]||""}
              onChange={e=>upKyufu(r.n,e.target.value)}
              placeholder="\u4F8B: 205700"
              style={{...inp2,width:"100%",fontWeight:"bold"}}/>
          </td>
          <td style={{...td,textAlign:"center",fontSize:10}}>{receiptDate}</td>
          <td style={{...td,padding:"2px",textAlign:"right"}}>
            <input type="number" value={tantoAmounts[r.n]||""}
              onChange={e=>upTanto(r.n,e.target.value)}
              placeholder="0"
              style={{...inp2,width:"100%"}}/>
          </td>
        </tr>)}
        {rows.length>0&&<tr style={{background:"#E8F5E9",fontWeight:"bold"}}>
          <td colSpan={3} style={td}>合計 {rows.length}名</td>
          <td style={td}></td>
          <td style={{...td,textAlign:"right",color:"#1B5E20"}}>
            ¥{rows.reduce((a,r)=>a+Number(kyufuAmounts[r.n]||0),0).toLocaleString()}
          </td>
          <td style={td}></td>
          <td style={{...td,textAlign:"right"}}>
            ¥{rows.reduce((a,r)=>a+Number(tantoAmounts[r.n]||0),0).toLocaleString()}
          </td>
        </tr>}
      </tbody>
    </table>
    </div>

    {/* 印刷用様式④ 1枚2人 */}
    <div style={{marginTop:8}}>
      {pairs.length===0&&<div style={{textAlign:"center",color:"#999",padding:20}}>
        「全員まとめて表示・印刷」にチェックするか、実績がある月を選択してください。
      </div>}
      {pairs.map((pair,pi)=>(
        <div key={pi} style={{display:"flex",gap:16,marginBottom:0,pageBreakAfter:"always",minHeight:"49vh"}}>
          {pair.map(r=>renderKyufuCard(r,pi*2))}
          {pair.length===1&&<div style={{flex:"0 0 calc(50% - 8px)",minWidth:0}}/>}
        </div>
      ))}
    </div>
  </div>;
}

// ============================================================
// 14. 施設外就労タブ（当日の施設外+通所 同時集計）
// ============================================================
// ============================================================
// 在宅記録タブ（写真様式準拠・AI反映・提出状況リンク）
// ============================================================
// ===== 在宅支援の評価セクション（写真様式準拠） =====
function ZHyokaSection({zd,upZ,name,ym,office,genAI,busy,zaitakuDays,attMonth}){
  const [y2,m2]=ym.split("-").map(Number);
  const [busyH,setBusyH]=useState(false);

  // 支援及び評価内容の項目（写真様式準拠）
  const SHIEN_ITEMS=[
    {key:"s_chishiki",label:"\u77E5\u8B58\u53CA\u3073\u80FD\u529B\u306E\u5411\u4E0A\u306E\u305F\u3081\u306B\u5FC5\u8981\u306A\u8A13\u7DF4\u305D\u306E\u4ED6\u306E\u5FC5\u8981\u306A\u652F\u63F4\u304C\u884C\u308F\u308C\u308B\u3068\u3068\u3082\u306B\u3001\u5E38\u306B\u5728\u5B85\u5229\u7528\u8005\u304C\u884C\u3046\u4F5C\u696D\u6D3B\u52D5\u3001\u8A13\u7DF4\u7B49\u306E\u30E1\u30CB\u30E5\u30FC\u3092\u63D0\u4F9B\u3002"},
    {key:"s_renraku",label:"1\u65E52\u56DE\u4EE5\u4E0A\u96FB\u8A71\u9023\u7D61\u3057\u3001\u5229\u7528\u8005\u306E\u5065\u5EB7\u72B6\u614B\u3084\u5728\u5B85\u751F\u6D3B\u306E\u69D8\u5B50\u7B49\u3092\u78BA\u8A8D\u3002\u5229\u7528\u8005\u3084\u5BB6\u65CF\u7B49\u304B\u3089\u306E\u76F8\u8AC7\u306B\u5FDC\u3058\u3001\u5728\u5B85\u751F\u6D3B\u306B\u304A\u3051\u308B\u52A9\u8A00\u7B49\u3092\u884C\u3046\u3002"},
    {key:"s_kinkyuu",label:"\u7DCA\u6025\u6642\u306E\u9023\u7D61\u4F53\u5236\u3092\u69CB\u7BC9\u3002\u5229\u7528\u8005\u3078\u306E\u5468\u77E5\u3092\u884C\u3046\u3002"},
  ];

  // 主な活動欄
  const [mainActivity,setMainActivity]=useState(()=>zd.mainActivity||"\u30DE\u30B9\u30AF\u4F5C\u308A\u3001\u30B7\u30FC\u30EB\u8CBC\u308A\u7B49");
  // 連絡先
  const [renrakuTel,setRenrakuTel]=useState(()=>zd.renrakuTel||(office&&office.tel)||"");
  // 担当者・責任者
  const [tanto,setTanto]=useState(()=>zd.tanto||(office&&office.kanri)||"");
  const [sekinin,setSekinin]=useState(()=>zd.sekinin||(office&&office.kanriName)||"");
  // 月の評価（右下）
  const [monthHyoka,setMonthHyoka]=useState(()=>zd.monthHyoka||"");
  // 訓練目標に対する評価
  const [goalHyoka,setGoalHyoka]=useState(()=>zd.goalHyoka||"");
  // 実施状況（各項目）
  const [jisshiStatus,setJisshiStatus]=useState(()=>zd.jisshiStatus||{});

  const upJisshi=(key,val)=>{
    const next={...jisshiStatus,[key]:val};
    setJisshiStatus(next);
    upZ("meta","jisshiStatus",next);
  };
  const saveMain=()=>{
    upZ("meta","mainActivity",mainActivity);
    upZ("meta","renrakuTel",renrakuTel);
    upZ("meta","tanto",tanto);
    upZ("meta","sekinin",sekinin);
    upZ("meta","monthHyoka",monthHyoka);
    upZ("meta","goalHyoka",goalHyoka);
  };

  // AI月評価生成
  const genMonthAI=async()=>{
    setBusyH(true);
    const shienTexts=zaitakuDays.map(d=>{
      const v=attMonth[d]||{};
      return d+"\u65E5: "+(v.memo||zd[d]?.shien||"");
    }).filter(x=>x.includes(":") && x.split(":")[1].trim()).join(" / ");
    const r=await ai(OFC()+"\u3001\u5229\u7528\u8005\u300C"+name+"\u300D"+y2+"\u5E74"+m2+"\u6708\u5728\u5B85\u652F\u63F4\u3002\u652F\u63F4\u5185\u5BB9:\u300C"+shienTexts+"\u300D\u3002\u6708\u306E\u8A55\u4FA1\uFF08\u51FA\u52E4\u72B6\u6CC1\u30FB\u69D8\u5B50\u30FB\u8AB2\u984C\u30FB\u7FCC\u6708\u306E\u65B9\u91DD\uFF09\u3092150\u6587\u5B57\u4EE5\u5185\u3067\u3002\u6587\u7AE0\u306E\u307F\u3002");
    if(r){setMonthHyoka(r.trim());upZ("meta","monthHyoka",r.trim());}
    setBusyH(false);
  };

  const thH={border:"1px solid #333",padding:"5px 8px",fontSize:11,fontWeight:"bold",background:"#f0f0f0",textAlign:"center",verticalAlign:"middle"};
  const tdH={border:"1px solid #333",padding:"5px 8px",fontSize:11,verticalAlign:"top"};

  const JISSHI_OPTIONS=["\u5B9F\u65BD","\u5B9F\u65BD\u30FB\u4E00\u90E8\u5B9F\u65BD\u30FB\u672A\u5B9F\u65BD","\u5B9F\u65BD\u30FB\u672A\u5B9F\u65BD","\u672A\u5B9F\u65BD"];

  return <div style={{border:"2px solid #333",borderRadius:4,overflow:"hidden",marginTop:8,pageBreakInside:"avoid"}}>
    {/* タイトル */}
    <div style={{background:"#1B5E20",color:"#fff",padding:"6px 12px",fontSize:13,fontWeight:"bold",textAlign:"center",letterSpacing:2}}>
      在宅支援の評価
    </div>

    {/* 支援及び評価内容テーブル */}
    <table style={{width:"100%",borderCollapse:"collapse"}}>
      <thead>
        <tr>
          <th style={{...thH,width:"65%"}}>支援及び評価内容</th>
          <th style={{...thH,width:"35%"}}>実施状況</th>
        </tr>
      </thead>
      <tbody>
        {SHIEN_ITEMS.map((item,i)=>(
          <tr key={i}>
            <td style={tdH}>
              <div style={{fontSize:11,lineHeight:1.7}}>・{item.label}</div>
              {i===0&&<div style={{marginTop:4,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:"#555"}}>主な活動：</span>
                <input value={mainActivity} onChange={e=>setMainActivity(e.target.value)}
                  onBlur={saveMain}
                  placeholder="\u4F8B: \u30DE\u30B9\u30AF\u4F5C\u308A\u3001\u30B7\u30FC\u30EB\u8CBC\u308A\u7B49"
                  style={{flex:1,padding:"2px 6px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3,minWidth:180}}/>
              </div>}
              {i===2&&<div style={{marginTop:4,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <span style={{fontSize:10,color:"#555"}}>緊急連絡先電話：</span>
                <input value={renrakuTel} onChange={e=>setRenrakuTel(e.target.value)}
                  onBlur={saveMain}
                  placeholder="\u4F8B: 070-7585-6262"
                  style={{width:140,padding:"2px 6px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3}}/>
                <span style={{fontSize:10,color:"#555"}}>責任者氏名：</span>
                <input value={sekinin} onChange={e=>setSekinin(e.target.value)}
                  onBlur={saveMain}
                  placeholder="\u4F8B: \u677E\u5143"
                  style={{width:80,padding:"2px 6px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3}}/>
                <span style={{fontSize:10,color:"#555"}}>担当者氏名：</span>
                <input value={tanto} onChange={e=>setTanto(e.target.value)}
                  onBlur={saveMain}
                  placeholder="\u4F8B: \u5B5D\u4EC1"
                  style={{width:80,padding:"2px 6px",fontSize:10,border:"1px solid #C8E6C9",borderRadius:3}}/>
              </div>}
            </td>
            <td style={{...tdH,textAlign:"center"}}>
              <select value={jisshiStatus[item.key]||"\u5B9F\u65BD"}
                onChange={e=>upJisshi(item.key,e.target.value)}
                style={{width:"100%",padding:"4px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:3}}>
                {JISSHI_OPTIONS.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            </td>
          </tr>
        ))}
        {/* 在宅利用者が行う主なサービス内容 */}
        <tr>
          <td style={tdH} colSpan={2}>
            <div style={{fontSize:11,fontWeight:"bold",color:"#1B5E20",marginBottom:4}}>・在宅利用者が行う主なサービス内容（在宅訓練等）</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,fontSize:11}}>
              {zaitakuDays.slice(0,5).map(d=>{
                const v=attMonth[d]||{};
                const memo=v.memo||zd[d]?.shien||"";
                return memo?<div key={d} style={{background:"#F1F8E9",border:"1px solid #C8E6C9",borderRadius:3,padding:"2px 8px"}}>{m2}/{d}：{memo.slice(0,20)}{memo.length>20?"\u2026":""}</div>:null;
              }).filter(Boolean)}
              {zaitakuDays.length===0&&<span style={{color:"#999",fontSize:10}}>在宅日の支援内容が表示されます</span>}
            </div>
          </td>
        </tr>
        {/* 在宅支援に関する取組 */}
        <tr>
          <td style={tdH} colSpan={2}>
            <div style={{fontSize:11,lineHeight:1.7}}>
              ・在宅利用者が行う作業活動、訓練等を行う上で疑似が生じた際の照合会等に対し、随時訪問や連絡等を行い、在宅による必要な支援が提供できる体制を確保する。
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    {/* 月の評価（右下・写真様式準拠） */}
    <div style={{borderTop:"2px solid #333",display:"flex",gap:0}}>
      <div style={{flex:1,padding:"8px 10px",borderRight:"1px solid #333"}}>
        <div style={{fontSize:11,fontWeight:"bold",color:"#1B5E20",marginBottom:4}}>
          ・訓練目標に対する評価を右に記入（月一の評価）
        </div>
        <div style={{fontSize:10,color:"#555",lineHeight:1.7}}>
          {name} ／ {y2}年{m2}月 ／ 在宅支援日数：{zaitakuDays.length}日
        </div>
        <div style={{marginTop:6,fontSize:10,color:"#388E3C"}}>
          事業所：{office.name||""}<br/>
          責任者：{sekinin||office.kanriName||""} ／ 担当：{tanto||office.kanri||""}
        </div>
      </div>
      <div style={{flex:2,padding:"8px 10px",display:"flex",flexDirection:"column",gap:6}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:11,fontWeight:"bold",color:"#1B5E20"}}>月の評価</div>
          <button className="np" onClick={genMonthAI} disabled={busyH}
            style={{padding:"3px 10px",fontSize:10,background:"#FFF8E1",border:"1px solid #FFE082",borderRadius:4,cursor:"pointer",fontWeight:"bold"}}>
            {busyH?"\u23F3 AI\u751F\u6210\u4E2D...":"\u1F916 AI\u3067\u6708\u8A55\u4FA1\u3092\u751F\u6210"}
          </button>
        </div>
        <textarea value={monthHyoka} onChange={e=>{setMonthHyoka(e.target.value);upZ("meta","monthHyoka",e.target.value);}}

          style={{width:"100%",padding:"5px 8px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4,resize:"vertical",lineHeight:1.7,fontFamily:"Meiryo,sans-serif"}}/>
        <div style={{fontSize:11,fontWeight:"bold",color:"#1B5E20",marginTop:2}}>訓練目標に対する評価</div>
        <textarea value={goalHyoka} onChange={e=>{setGoalHyoka(e.target.value);upZ("meta","goalHyoka",e.target.value);}}
          rows={2} placeholder="\u8A13\u7DF4\u76EE\u6A19\u306B\u5BFE\u3059\u308B\u9054\u6210\u72B6\u6CC1\u30FB\u8AB2\u984C\u3092\u8A18\u5165"
          style={{width:"100%",padding:"5px 8px",fontSize:11,border:"1px solid #C8E6C9",borderRadius:4,resize:"vertical",lineHeight:1.7,fontFamily:"Meiryo,sans-serif"}}/>
      </div>
